<span id="more"></span>

<ol>
<li><p>HTML（HyperText Markup Language）：超文本标记语言，用来描述网页的一种语言。html不是编程语言，是一种标记语言（标签语言）。</p>
<p>超文本：包括了文字、图片、声音、视频、超链接等多种元素。</p>
</li>
</ol>
<hr>
<ol start="2">
<li><p>关于在html中<script>标签的位置：</p>
<p>在html文件中，代码是<u>按照其出现顺序依次执行</u>的，所以把<script>标签放到底部，保证执行JS代码时，页面已经完全加载。</p>
</li>
</ol>
<hr>
<ol start="3">
<li><img>的<code>object-fit: cover</code>失效，图像依旧溢出：</li>
</ol>
<p>原因：没有限制图片容器，也就是<img>元素的大小</p>
   <figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="selector-tag">img</span> &#123;</span><br><span class="line">  <span class="attribute">height</span>: <span class="number">100%</span>;</span><br><span class="line">  <span class="attribute">width</span>: <span class="number">100%</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><code>object-fit</code>元素：指定图片或视频内容应该如何适应到包含它的标签（<img>和<video>）</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="attribute">object-fit</span>: contain;   // 被替换的内容将被缩放，保持其宽高比，因此如果宽高比与框的宽高比不匹配，将出现&quot;黑边&quot;</span><br><span class="line"><span class="attribute">object-fit</span>: cover;     // 保持其宽高比的同时填充元素的整个内容框，如果对象的宽高比与内容框不相匹配，该对象将被剪裁以适应内容框。</span><br><span class="line"><span class="attribute">object-fit</span>: fill;      // 对象完全填充此框，不保持其宽高比</span><br><span class="line"><span class="attribute">object-fit</span>: none;      // 被替换的内容将保持其原有的尺寸。</span><br><span class="line"><span class="attribute">object-fit</span>: scale-down;</span><br></pre></td></tr></table></figure>

<hr>
<ol start="4">
<li><p>margin什么情况下会合并？</p>
<p>涉及到外边距折叠，详见<a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/CSS_box_model/Mastering_margin_collapsing">掌握外边距折叠 - CSS：层叠样式表 | MDN (mozilla.org)</a></p>
</li>
</ol>
<hr>
<ol start="5">
<li><p>100vw导致出现滚动条：</p>
<p>原因：设置100vw的元素占据了整个视口宽度，若还存在其他元素占据空间，就会导致溢出，视口不能一次展示所有内容，就会出现滚动条。</p>
<p>如果是body元素设置了100vw和100vh，可能是由于margin默认为8导致的滚动条，可以通过css设置：</p>
<p>width: calc(100vw - 16px);</p>
<p>height: calc(100vh - 16px);</p>
<p>来避免滚动条。</p>
</li>
</ol>
<hr>
<ol start="6">
<li>关于calc()的坑：</li>
</ol>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">错误写法：</span><br><span class="line">calc(<span class="number">100vw</span>-<span class="number">180px</span>);</span><br><span class="line"></span><br><span class="line">正确写法：</span><br><span class="line">calc(<span class="number">100vw</span> - <span class="number">180px</span>); <span class="comment">/* 必须要加空格！*/</span></span><br></pre></td></tr></table></figure>

<hr>
<ol start="7">
<li><p>CSS 中<code>border-radius</code>失效:</p>
<p>原因：子元素背景溢出了父元素。</p>
<p>解决方法：父元素添加<code>overflow: hidden</code></p>
</li>
</ol>
<hr>
<p>8. </p>
<hr>
<ol start="9">
<li><p>块级元素在默认情况下：</p>
<p>宽 = 父元素的宽</p>
<p>高 = 内容的高度</p>
</li>
</ol>
<hr>
<ol start="10">
<li><p><code>marigin: 0 auto;</code>可以实现居中？</p>
<p><code>marigin: 0 auto</code>或<code>marigin: auto</code>可以实现水平居中，但不能实现垂直居中。原因：由于块级元素，即便我们设置了宽度，它还是会占据一整行。</p>
<p>当设置了<code>marigin: 0 auto</code>或<code>marigin: auto</code>时，浏览器就会均匀分配剩余的空间（行宽 - 元素宽度 - 内边距 - 边框）到块级元素的左右外边距上。</p>
<p>对于垂直方向，块级元素不存在占据一列这样的概念，所以即便设置了<code>marigin: auto</code>，也没有空间可分配，故实现不了居中效果。</p>
</li>
</ol>
<hr>
<ol start="11">
<li><p>如何实现<code>div</code>居中？</p>
<p>1）<code>marigin: 0 auto</code>或<code>marigin: auto</code>可以实现块级元素的水平居中</p>
<p>2）弹性盒子flex布局</p>
<p>3）定位position：</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="attribute">position</span>: fixed</span><br><span class="line">left: <span class="number">0</span>;</span><br><span class="line"><span class="attribute">right</span>: <span class="number">0</span>;</span><br></pre></td></tr></table></figure>

<p>或</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">// 父元素css中：</span><br><span class="line"><span class="attribute">position</span>: relative;</span><br><span class="line"></span><br><span class="line">// 子元素css中：</span><br><span class="line"><span class="attribute">position</span>: relative;</span><br><span class="line"><span class="attribute">top</span>: <span class="number">50%</span>;</span><br><span class="line"><span class="attribute">left</span>: <span class="number">50%</span>;</span><br><span class="line">// 相<span class="attribute">X</span>轴、<span class="attribute">Y</span>轴，分别向反方向偏移<span class="number">50%</span>宽度、<span class="number">50%</span>高度的距离</span><br><span class="line"><span class="attribute">transform</span>: <span class="built_in">translate</span>(-<span class="number">50%</span>, -<span class="number">50%</span>);</span><br></pre></td></tr></table></figure></li>
</ol>
<hr>
<ol start="12">
<li><p>如何更改字体颜色？</p>
<p>使用 CSS 属性<code>color</code></p>
</li>
</ol>
<hr>
<ol start="13">
<li><p>盒模型：</p>
<ul>
<li>如果是标准盒模型，<code>box-sizing: content-box</code>，宽高设置的是元素内容的大小，元素的大小为宽高+内边距+边框。</li>
<li>如果是替代盒模型，<code>box-sizing: border-box</code>，宽高设置的是盒子的大小，元素内容的大小为宽高-内边距-边框</li>
</ul>
<p><code>&lt;button&gt;</code>按钮标签的大小计算方式（<code>box-sizing</code>属性）默认为<code>border-box</code>，即width和height是盒子的宽高，内容的宽高通过减法计算得出。</p>
<p>而在另一种<code>box-sizing: content-box</code>中，width和height是内容的宽高，盒子的宽高通过加法计算得出。</p>
</li>
</ol>
<hr>
<ol start="14">
<li>选择器<code>.btn:disabled</code>，伪类和伪元素</li>
</ol>
<hr>
<ol start="15">
<li><p>弹性盒子布局Flexbox（<code>display: flex</code>）的<strong>盒对齐属性</strong></p>
<ul>
<li><p><code>flex-direction</code>：决定弹性盒子的主轴，默认是行轴<code>row</code></p>
</li>
<li><p><code>justify-content</code>：决定行轴上元素的布局方式</p>
<ul>
<li><code>center</code>：所有子元素居中显示</li>
<li><code>space-between</code>：均匀排列每个元素，首个元素放置于起点，末尾元素放置于终点</li>
<li><code>space-around</code>：均匀排列每个元素，每个元素周围分配相同的空间</li>
</ul>
</li>
<li><p><code>align-items</code>：决定各个元素在交叉轴（默认为纵轴）上的对齐方式</p>
</li>
<li><p><code>align-content</code>：和<code>justify-content</code>作用相同，不过是作用于交叉轴上元素。</p>
</li>
<li><p><code>justify-items</code>：在弹性盒子中无效</p>
</li>
</ul>
</li>
</ol>
<hr>
<ol start="16">
<li><p><code>article :first-child</code>选择器会选择所有<article>元素的每一代子元素中的第一个元素，<code>article :first-child</code>等价于<code>article *:first-child</code>，后者可读性更高，为了避免和<code>article:first-child</code>混淆。</p>
<p><code>article:first-child</code>选择器会选择一组兄弟元素中，是第一个元素，且是<article>的元素。</p>
</li>
</ol>
<hr>
<ol start="17">
<li><p>CSS的<code>z-index</code>属性</p>

<ol start="19">
<li><p>嵌套选择器 &amp; ：</p>
<p>嵌套选择器 &amp; 的一个使用场景：当嵌套规则需要被附加到父规则上时，例如当使用<a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/Pseudo-classes">伪类</a>，或者创建<a target="_blank" rel="noopener" href="https://developer.mozilla.org/en-US/docs/Web/CSS/CSS_selectors/Selector_structure">组合选择器</a>时，此时<code>&amp;</code> 必须紧贴在子选择器之前：</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"><span class="selector-class">.parent-rule</span> &#123;</span><br><span class="line">  &amp;<span class="selector-class">.child-rule</span> &#123; <span class="comment">/* &amp;和选择器之间不能有空格 */</span></span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">等价于</span><br><span class="line"></span><br><span class="line"><span class="selector-class">.parent-rule</span> &#123;</span><br><span class="line">    </span><br><span class="line">&#125;</span><br><span class="line"><span class="selector-class">.parent-rule</span><span class="selector-class">.child-rule</span> &#123;</span><br><span class="line">  <span class="comment">/* 同时具有 parent-rule 和 child-rule 类的元素 */</span></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>当不加&amp;时：</p>
<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"><span class="selector-class">.parent-rule</span> &#123;</span><br><span class="line">  <span class="selector-class">.child-rule</span> &#123;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">等价于：</span><br><span class="line"></span><br><span class="line"><span class="selector-class">.parent-rule</span> &#123;</span><br><span class="line">    </span><br><span class="line">&#125;</span><br><span class="line"><span class="selector-class">.parent-rule</span> <span class="selector-class">.child-rule</span> &#123;</span><br><span class="line">  <span class="comment">/* 是 .parent-rule 的子元素且具有 .child-rule 的元素 */</span></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></li>

<ol start="30">
<li>CSS display属性（外部显示类型 &amp; 内部显示类型）</li>
</ol>
<p>CSS中的display属性，用来设置元素的内部和外部显示类型</p>
<p><u>外部显示类型（规定其在父容器中的排列方式）：</u></p>
<ul>
<li><code>display: block</code>:</li>
</ul>
<ol>
<li>会产生换行</li>
<li><a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/width"><code>width</code></a> 和 <a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/height"><code>height</code></a> 属性有效。盒子宽度默认为行宽，占据一整行。</li>
<li>内外边距、边框会将其他元素推开</li>
</ol>
<ul>
<li><code>display: inline</code>:</li>
</ul>
<ol>
<li>不会产生换行</li>
<li><a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/width"><code>width</code></a> 和 <a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/height"><code>height</code></a> 属性不会发挥作用</li>
<li>垂直方向的内边距、外边距以及边框会被应用但是不会把其他处于 <code>inline</code> 状态的盒子推开。</li>
<li>水平方向的内边距、外边距以及边框会被应用且会把其他处于 <code>inline</code> 状态的盒子推开。</li>
</ol>
<ul>
<li><code>display: inline-block</code>：不会产生换行，盒子宽度默认为其本身的宽度。其他行为和<code>display: block</code>相同。</li>
</ul>
<hr>
<p><u>内部显示类型（规定其内部子元素的排列方式）：</u></p>
<ul>
<li><code>display: flow</code>（流式布局，默认值）</li>
<li><code>display: flex</code>（弹性盒子）</li>
<li><code>display: grid</code>（网格布局）</li>
<li><code>display: table</code>（表格布局）</li>
</ul>

<figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">div</span> <span class="attr">class</span>=<span class="string">&quot;container&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">div</span> <span class="attr">class</span>=<span class="string">&quot;flex1&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">div</span> <span class="attr">class</span>=<span class="string">&quot;flex2&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br></pre></td></tr></table></figure>

<figure class="highlight css"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line"><span class="selector-class">.container</span>&#123;</span><br><span class="line">    <span class="attribute">margin-top</span>: <span class="number">100px</span>;</span><br><span class="line">    <span class="attribute">width</span>: <span class="number">400px</span>;</span><br><span class="line">    <span class="attribute">height</span>: <span class="number">200px</span>;</span><br><span class="line">    </span><br><span class="line">    <span class="attribute">display</span>: flex;</span><br><span class="line">    <span class="attribute">align-items</span>: center;</span><br><span class="line">&#125;</span><br><span class="line">    </span><br><span class="line"><span class="selector-class">.container</span> &gt; <span class="selector-tag">div</span>&#123;</span><br><span class="line">    <span class="attribute">height</span>: <span class="number">100%</span>;</span><br><span class="line">    <span class="attribute">border</span>: <span class="number">2px</span> solid black;</span><br><span class="line">    <span class="attribute">flex</span>: <span class="number">1</span>;</span><br><span class="line">&#125;</span><br><span class="line">    </span><br><span class="line"><span class="selector-class">.flex2</span>&#123;</span><br><span class="line">    <span class="attribute">padding</span>: <span class="number">0</span> <span class="number">50px</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>预期结果：</p>
<p>​    flex1和flex2的主轴长度为：(400-100)/2 = 150，由于flex2有100px的padding，故flex2的content宽50px</p>
<p>实际结果：</p>
<p>​    flex1主轴长度：(400-100)/2 = 150</p>
<p>​    flex2主轴长度：(400-100)/2 + 100 = 250</p>
<p><img src="C:\Users\15927\AppData\Roaming\Typora\typora-user-images\image-20241115163511972.png" alt="image-20241115163511972"></p>
<p>结论：</p>
<p>​    flex布局在给子元素分配空间时，会先从容器大小中除去子元素padding的大小，然后再按照flex属性进行分配。类似于box-sizing: content-box（标准盒模型）。</p>
<p>解决方案：给设置padding属性的子元素套一层div</p>
</li>

<ol start="39">
<li><p>flex属性（为以下属性的简写(有顺序)：flex-grow | flex-shrink | flex-basis）</p>
<ul>
<li>flex-basis：元素主轴方向的初始大小，优先级 &gt; width。</li>
<li>flex-grow：容器剩余空间（容器会先减去通过flex-basis或width设置的元素初始大小，再减去padding）的分配比例，如果margin设置了auto，会分配给margin而不是宽高。</li>
<li>flex-shrink：当元素分配完初始大小后，如果超过了容器大小，各个元素则会按flex-shrink设置的比例进行缩小。</li>
</ul>

<p>上方还有一条上标基线，贴着z、p的顶部</p>
<p><em>vertical-align</em> 的默认值为 <em>baseline</em>，意思是与父元素的下标基线对齐。所以行内块元素的下沉，实际上是由于垂直对齐方式导致的。通过指定<em>vertical-align: top</em>可以将元素顶部与父容器顶部对齐。</p>
<p>详见：<a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/CSS/vertical-align">vertical-align - CSS：层叠样式表 | MDN</a></p>

<p>原因：元素被当成行内元素进行排版时，元素之间的空白符（空格、换行）会被浏览器处理。在父级块字体不为0的情况下，占据1/2*font-size的宽度。例如当父级块font-size：16px时，空白符宽度为8px。</p>
<p>解决方法：</p>
<ul>
<li>方法一：删除元素之间的空白符。缺点：代码可读性变差</li>
<li>方法二：设置父级块字体大小为0。缺点：子元素如果要显示文字，必须设置字体大小</li>

<ol start="57">
<li><p>设置<code>position: absolute</code>或<code>position: fixed</code>的元素不能正确匹配锚点元素（包含块）。</p>
<p>原因：当设置了<code>position</code>的元素的父元素设置了<code>transform</code>属性时(<code>transform</code>属性不为<code>none</code>)，元素会将父元素作为锚点元素。</p>
<blockquote>
<p>正常情况下，fixed 元素的块级格式上下文 Block Formatting Context（BFC） 由 viewport 创建，也就是fixed 元素的 BFC 包含在根元素的 BFC 里。</p>
<p>而transform 属性使元素创建了新的 BFC，所有的子元素都被包含在这个新的 BFC 内。那么设置了 position: fixed 的子元素 BFC 被包含在了 transform 元素的 BFC 里。</p>
</blockquote>

<ol start="60">
<li><p><code>flex-grow: 1</code>和<code>flex: 1</code>的区别</p>
<p><u>首先请理解三个flex属性的含义</u>（<code>flex-grow</code>，<code>flex-shrink</code>，<code>flex-basis</code>）</p>
<p><code>flex-grow: 1</code>只设置了<code>flex-grow</code>属性，如果此前没有修改过其他<code>flex</code>属性，那么此时<code>flex: 1 1 auto</code>(三个值分别对应<code>flex-grow</code>，<code>flex-shrink</code>，<code>flex-basis</code>)</p>
<p><code>flex: 1</code>除了将<code>flex-grow</code>的值更新为1，还额外设置了<code>flex-basis</code>属性为0。</p>
<p><u>存在的问题是：</u></p>
<p>​    flex元素的<code>flex-basis</code>属性，即元素的初始大小，默认值等于其内容的大小。弹性盒子会先给flex元素分配初始大小，然后再按照<code>flex-grow</code>的比例分配剩余空间。假设此时有三个元素，都设置<code>flex-grow: 1</code>，预期是三个元素主轴方向大小相等。如果这三个元素的初始大小不同，它们的实际大小也会各不相同。</p>
<p><u>解决方案：</u></p>
<pre><code>- 直接使用flex属性
- 设置`flex-grow`属性的同时，同时设置`flex-basis`为0
</code></pre>
</li>
</ol>

<ol start="72">
<li><p>响应式变量<code>ref()</code>和<code>reactive()</code></p>
<ul>
<li><p>响应式变量的作用：</p>
<p>答：当响应式变量更新时，依赖对应响应式变量的DOM元素会进行更新。基本实现原理：为内部对象创建代理类，修改各个属性的<code>getter/setter</code>方法。</p>
</li>
<li><p>深层响应性：</p>
<p>例如，<code>ref()</code>包裹了一个嵌套对象：</p>
<figure class="highlight typescript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">const</span> state = <span class="title function_">ref</span>(&#123;</span><br><span class="line">  <span class="attr">parent</span>: &#123; <span class="attr">child</span>: <span class="number">1</span> &#125;,</span><br><span class="line">&#125;);</span><br></pre></td></tr></table></figure>

<p>child属性发生的更改也会变监测到。</p>
<p>实现原理：会为嵌套对象也创建一个代理类，测试代码：</p>
<figure class="highlight tsx"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">const</span> r = <span class="title function_">reactive</span>(&#123;</span><br><span class="line">  <span class="attr">a</span>: &#123; <span class="attr">b</span>: <span class="number">1</span> &#125;,</span><br><span class="line">&#125;);</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(r);</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(r.<span class="property">a</span>);</span><br></pre></td></tr></table></figure>

<p>运行结果：</p>
<p><img src="D:\typora-images\image-20250411182843767.png" alt="image-20250411182843767"></p>
</li>
<li><p>DOM 的更新时机：</p>
<p>当修改了响应式状态时，DOM 不会立刻进行更新。Vue 会在“next tick”更新周期中缓冲所有状态的修改，以确保不管你进行了多少次状态修改，每个组件都只会被更新一次。</p>
<p>要等待 DOM 更新完成后再执行额外的代码，可以使用 <code>nextTick()</code>全局 API：</p>
</li>
<li><p><code>ref()</code>和<code>reactive()</code>的区别，各自的使用场景：</p>
<ol>
<li><p>使用<code>ref()</code>时，需要调用<code>.value</code>访问内部值，会多很多模板代码；而<code>reactive()</code>则可以直接访问：<code>state.value.parent / state.parent</code></p>
</li>
<li><p><code>reactive()</code>只支持对象类型，不支持诸如string、number等原始类型；<code>ref()</code>则支持所有类型</p>
</li>
<li><p><code>reactive()</code>不支持替换整个内部对象，而<code>ref()</code>则可以：</p>
<figure class="highlight typescript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">const</span> state = <span class="title function_">reactive</span>(&#123;</span><br><span class="line">  <span class="attr">parent</span>: &#123; <span class="attr">child</span>: <span class="number">1</span> &#125;,</span><br><span class="line">&#125;);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 检测不到更新！</span></span><br><span class="line">state = <span class="title function_">reactive</span>(&#123;</span><br><span class="line">  <span class="attr">parent</span>: &#123; <span class="attr">child</span>: <span class="number">2</span> &#125;,</span><br><span class="line">&#125;);</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line"><span class="keyword">const</span> state = <span class="title function_">ref</span>(&#123;</span><br><span class="line">  <span class="attr">parent</span>: &#123; <span class="attr">child</span>: <span class="number">1</span> &#125;,</span><br><span class="line">&#125;);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 可以正常更新</span></span><br><span class="line">state.<span class="property">value</span> = &#123;</span><br><span class="line">  <span class="attr">parent</span>: &#123; <span class="attr">child</span>: <span class="number">2</span> &#125;,</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
</li>
<li><p>使用场景：都差不多，喜欢用哪个用哪个。<code>reactive()</code>更适合多个对象组合在一起的情况。</p>

<ol start="81">
<li><p>JavaScript 多线程（todo）</p>
<p>JavaScript通过<code>Promise</code>、<code>async/await</code>关键字等方式实现异步操作。</p>
<ul>
<li><p><code>Promise</code>的基本使用：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">const</span> p = <span class="title function_">asyncFunc</span>(x).<span class="title function_">then</span>().<span class="title function_">catch</span>();</span><br><span class="line"><span class="comment">// asyncFunc 为异步方法，使用async关键字，执行网络请求等异步操作</span></span><br><span class="line"><span class="comment">// then()在promise兑现（完成）后回调</span></span><br><span class="line"><span class="comment">// catch()在promise拒绝（出现错误）后回调</span></span><br><span class="line"></span><br><span class="line"><span class="comment">// then方法 串行执行多个任务</span></span><br><span class="line"><span class="title function_">doSomethingAsync</span>()</span><br><span class="line">   .<span class="title function_">then</span>(<span class="function">(<span class="params">res1</span>) =&gt;</span> &#123;</span><br><span class="line">      <span class="keyword">return</span> <span class="title function_">doSomethingElse</span>();</span><br><span class="line">   &#125;)</span><br><span class="line">   .<span class="title function_">then</span>(<span class="function">(<span class="params">res2</span>) =&gt;</span> &#123;</span><br><span class="line">      <span class="variable language_">console</span>.<span class="title function_">log</span>(res2);</span><br><span class="line">   &#125;);</span><br><span class="line"><span class="comment">// then传入的回调会被放入微任务队列</span></span><br><span class="line"></span><br><span class="line"><span class="comment">// 并发操作 ↓</span></span><br><span class="line"><span class="comment">// 注意下面的方法是通过切换Promise控制权实现的并发，JavaScript是单线程的，本质上无法实现并行。想要实现并行需要使用worker</span></span><br><span class="line"><span class="comment">// 并发：多个任务交替执行，通过时间片轮转或事件驱动实现“看似同时执行”的效果</span></span><br><span class="line"><span class="comment">// 并行：多个任务真正同时执行，需要硬件支持。</span></span><br><span class="line"></span><br><span class="line"><span class="comment">// all方法 并发执行多个promise，返回的promise在所有并发promise「兑现」后兑现，当任意一个promise拒绝后立刻拒绝。并终止所有并发promise的操作。</span></span><br><span class="line"><span class="title class_">Promise</span>.<span class="title function_">all</span>([p1, p2]).<span class="title function_">then</span>(<span class="keyword">function</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">// allSettled方法 并发执行多个promise，返回的promise在所有并发promise「完成」后兑现。</span></span><br><span class="line"><span class="title class_">Promise</span>.<span class="title function_">allSettled</span>([p1, p2]).<span class="title function_">then</span>(<span class="keyword">function</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">// race方法 并发执行多个任务，在任意一个promise兑现后兑现，在任意一个promise拒绝后拒绝</span></span><br><span class="line"><span class="title class_">Promise</span>.<span class="title function_">race</span>([p1, p2]).<span class="title function_">then</span>(<span class="keyword">function</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">// any方法 并发执行多个任务，在任意一个promise兑现后兑现，在所有promise被拒绝后拒绝</span></span><br><span class="line"><span class="title class_">Promise</span>.<span class="title function_">any</span>([p1, p2]).<span class="title function_">then</span>(<span class="keyword">function</span>);</span><br></pre></td></tr></table></figure>
</li>
<li><p><code>.then()</code>传入回调的返回值</p>
<p><code>.then()</code>传入的回调的返回值可以是普通值，也可以是<code>Promise</code>对象，如果是后者，则会等待返回的<code>Promise</code>对象完成（resolve）后，再继续链式调用后续<code>.then()</code>。</p>
<p>如果在<code>.then()</code>中创建了Promise，一定要返回，否则创建的Promise将会脱离控制。</p>
<p>通常情况下，不要嵌套使用Promise，应该将嵌套链扁平化为单链。</p>
</li>
<li><p><code>.catch()</code>的后续链式操作</p>
<p>catch执行完毕后，会直接调用后续的then。</p>
</li>
<li><p>Promise的构造函数</p>
<p>使用构造函数闯进Promise对象，传入的回调会直接在主线程调用：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">setTimeout</span>(<span class="keyword">function</span>(<span class="params"></span>)&#123;</span><br><span class="line">	<span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&#x27;1&#x27;</span>);</span><br><span class="line">&#125;);</span><br><span class="line"><span class="keyword">new</span> <span class="title class_">Promise</span>(<span class="keyword">function</span>(<span class="params">resolve</span>)&#123;		    </span><br><span class="line">	<span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&#x27;2&#x27;</span>);</span><br><span class="line">	<span class="title function_">resolve</span>();</span><br><span class="line">&#125;).<span class="title function_">then</span>(<span class="keyword">function</span>(<span class="params"></span>)&#123;		    </span><br><span class="line">	<span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&#x27;3&#x27;</span>);</span><br><span class="line">&#125;).<span class="title function_">then</span>(<span class="keyword">function</span>(<span class="params"></span>)&#123;</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&#x27;4&#x27;</span>)</span><br><span class="line">&#125;); 		</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&#x27;5&#x27;</span>);</span><br><span class="line"><span class="comment">// 2 5 3 4 1</span></span><br><span class="line">————————————————</span><br><span class="line">原文链接：<span class="attr">https</span>:<span class="comment">//blog.csdn.net/NancyFyn/article/details/118407548</span></span><br></pre></td></tr></table></figure>

<p>一般是用<code>Promise.then()</code>构造Promise对象，在不支持<code>Promise.then()</code>的版本，使用Promise的构造函数创建对象：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 搭配setTimeout()</span></span><br><span class="line"><span class="keyword">const</span> promise1 = <span class="keyword">new</span> <span class="title class_">Promise</span>(<span class="function">(<span class="params">resolve, reject</span>) =&gt;</span> &#123;</span><br><span class="line">  <span class="built_in">setTimeout</span>(<span class="function">() =&gt;</span> &#123;</span><br><span class="line">    <span class="title function_">resolve</span>(<span class="string">&quot;foo&quot;</span>);</span><br><span class="line">  &#125;, <span class="number">300</span>);</span><br><span class="line">&#125;);</span><br></pre></td></tr></table></figure>
</li>
<li><p><code>setTimeout()</code>和<code>Promise</code>的调用顺序</p>
<p><code>setTimeout()</code>会<strong>将回调放入任务队列</strong>，而<code>Promise.then()</code>会<strong>将回调放入微任务队列</strong>，两者的调用顺序是不可预测的，谁先调用都有可能。</p>
</li>
<li><p><code>async/await</code>关键字</p>
<p><code>async</code>关键字用于声明一个异步方法，用<code>async</code>声明的方法会返回一个<code>Promise</code>对象；<code>await</code>关键字用来指定一个<code>Promise</code>对象，它会同步地，阻塞地执行<code>Promise</code>对象，只能在async方法中使用（猜测目的是保证不阻塞“主线程”）。</p>
<p>在串行执行异步方法的场景下，直接使用Promise的写法和配合<code>async/await</code>的写法：</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 使用async，避免了串行执行异步方法时的嵌套回调，用同步的写法编写异步代码，</span></span><br><span class="line"><span class="comment">// 同时可以用来封装异步方法</span></span><br><span class="line"><span class="keyword">async</span> <span class="keyword">function</span> <span class="title function_">get</span>(<span class="params">url</span>) &#123;</span><br><span class="line">    <span class="keyword">let</span> resp = <span class="keyword">await</span> <span class="title function_">fetch</span>(url);</span><br><span class="line">    <span class="keyword">let</span> result = <span class="keyword">await</span> resp.<span class="title function_">json</span>();</span><br><span class="line">    <span class="keyword">return</span> result;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="title function_">get</span>(url)</span><br><span class="line">    .<span class="title function_">then</span>(<span class="function"><span class="params">result</span> =&gt;</span> &#123;</span><br><span class="line">       <span class="variable language_">console</span>.<span class="title function_">log</span>(result);</span><br><span class="line">    &#125;)</span><br></pre></td></tr></table></figure></li>
</ul>
</li>
</ol>

<ol start="83">
<li><p>JavaScript 模块化方案</p>
<ul>
<li><p>CommonJS模块：Node.js的模块化方案，在<strong>运行时加载</strong>模块，因此也没办法在编译时做“静态优化”。</p>
<p>CommonJS中模块即对象，调用模块方法时必须首先加载整个模块，然后再调用对象的属性：</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// CommonJS模块</span></span><br><span class="line"><span class="keyword">let</span> &#123; stat, exists, readfile &#125; = <span class="built_in">require</span>(<span class="string">&#x27;fs&#x27;</span>);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 等同于</span></span><br><span class="line"><span class="keyword">let</span> _fs = <span class="built_in">require</span>(<span class="string">&#x27;fs&#x27;</span>);</span><br><span class="line"><span class="keyword">let</span> stat = _fs.<span class="property">stat</span>;</span><br><span class="line"><span class="keyword">let</span> exists = _fs.<span class="property">exists</span>;</span><br><span class="line"><span class="keyword">let</span> readfile = _fs.<span class="property">readfile</span>;</span><br></pre></td></tr></table></figure>
</li>
<li><p>ECMAScript 6 模块：JS官方在语言层面支持的模块化方案，ES6模块是<strong>编译时加载（静态加载）</strong>，使静态分析成为了可能，也使得宏（macro）和类型检验（type system）这些只能靠静态分析实现的功能成为了可能。</p>
</li>
<li><p>ES6模块是否支持在方法内，运行时加载模块？例如：</p>

<li><p>引用类型本质上是值为所指向对象地址的变量，举例：</p>
<ol>
<li><p>当一个方法中传入了一个对象作为参数，如果通过直接赋值修改这个对象，对象本身不会变化</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">const</span> b = &#123;</span><br><span class="line">  <span class="attr">val</span>: <span class="number">1</span>,</span><br><span class="line">&#125;;</span><br><span class="line"><span class="keyword">function</span> <span class="title function_">change</span>(<span class="params">b</span>)&#123;</span><br><span class="line">    <span class="comment">// 不能改变b，改变的只是局部变量的值（这个值是b的地址）</span></span><br><span class="line">    b = &#123;</span><br><span class="line">        <span class="attr">val</span>: <span class="number">2</span>,</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">// 可以改变b</span></span><br><span class="line">    b.<span class="property">val</span> = <span class="number">3</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="title function_">change</span>(b);</span><br></pre></td></tr></table></figure>

<p>关于引用传递和值传递：</p>
<p>当一个对象作为参数传入到方法中时，实际上是把对象的引用（即对象的地址）作为一个局部变量传入到方法中，局部变量的值就是对象的地址，所以引用传递本质上也是值传递，<strong>java只有值传递</strong>。</p>
<p>直接给方法中的对象赋值，改变的是局部变量的值，并不能改变外面的对象。想要改变一个对象，只能通过<code>.</code>改变对象的属性。</p>
<p>参考：<a target="_blank" rel="noopener" href="https://blog.csdn.net/xhf852963/article/details/90768508">java 对象作为方法参数传递到一个方法后，对象内容发生改变的相关分析_java对象传递方法可以修改对象吗-CSDN博客</a></p>
</li>
<li><p>连等赋值问题</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> a = &#123;<span class="attr">n</span>:<span class="number">1</span>&#125;;</span><br><span class="line"><span class="keyword">let</span> b = a;</span><br><span class="line">a.<span class="property">x</span> = a = &#123;<span class="attr">n</span>:<span class="number">2</span>&#125;;</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(a.<span class="property">x</span>); <span class="comment">//undefined</span></span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(b.<span class="property">x</span>); <span class="comment">//&#123;n:2&#125;</span></span><br></pre></td></tr></table></figure>

<p>理解上述结果需要两个知识点：</p>
<ol>
<li>赋值运算符的右结合性：如果一个表达式出现多个赋值，从右往左计算</li>
<li>JS 引擎对赋值表达式的处理过程</li>
</ol>
<p>形如<code>A = B</code>的表达式叫做赋值表达式，A和B又分别可以是表达式，B可以是任意表达式，但A的计算结果必须是一个<strong>左值</strong>，即可以被赋值的变量。</p>
<p>JS 引擎计算<code>A = B</code>的过程是怎么样的呢？</p>
<p>   1.计算表达式A，得到一个引用<code>refA</code></p>
<p>   2.计算表达式B，得到一个值<code>valueB</code></p>
<p>   3.将<code>valueB</code>赋值给<code>refA</code></p>
<p>   4.返回<code>valueB</code></p>
<p>在计算<code>a.x = a = {n:2}</code>时，我们将<code>{n:1}</code>记为N1，首先计算“A”，即N1.x；再计算“B”，即<code>a = {n:2}</code>，而a只是一个引用，并不是对象N1，</p>
<p>所以先创建一个对象<code>{n:2}</code>，我们记做N2，再将a指向N2（把N2的地址值赋给a），最后将N2赋值给“A”的计算结果N1.x</p>
<p>最终，a={n:2}，b始终指向N1，所以b.x={n:2}。</p>
<p>参考：<a target="_blank" rel="noopener" href="https://segmentfault.com/a/1190000004224719">由ES规范学JavaScript(二)：深入理解“连等赋值”问题 - 追根溯源 - SegmentFault 思否</a></p>
</li>
</ol>
</li>
</ol>

<li><p>什么是跨域？</p>
<p>一个url由<strong>协议</strong>、<strong>域名</strong>、<strong>端口</strong>三个部分组成：<code>http://localhost:8080</code></p>
<p>当一个请求的url和当前页面的url有任意一个部分不同，就是跨域：</p>
<p><img src="D:\typora-images\image-20250905111109355.png" alt="image-20250905111109355"></p>
</li>
<li><p>解决方案：CORS（Cross-Origin Resource Sharing，跨域资源共享），即添加响应头解决</p>
<img src="D:\typora-images\image-20250506141441714.png" alt="image-20250506141441714" style="zoom: 67%;" />

<p>在koa2中，可以使用koa-cors中间件解决跨域：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> cors <span class="keyword">from</span> <span class="string">&quot;@koa/cors&quot;</span>;</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> app = <span class="keyword">new</span> <span class="title class_">Koa</span>();</span><br><span class="line">app.<span class="title function_">use</span>(</span><br><span class="line">  <span class="title function_">cors</span>(&#123;</span><br><span class="line">    <span class="attr">origin</span>: <span class="string">&#x27;*&#x27;</span>, <span class="comment">// 即Access-Control-Allow-Origin响应头</span></span><br><span class="line">    <span class="attr">credentials</span>: <span class="literal">true</span>, <span class="comment">// Access-Control-Allow-credentials。是否允许发送Cookie</span></span><br><span class="line">    <span class="attr">allowMethods</span>: [<span class="string">&quot;GET&quot;</span>, <span class="string">&quot;POST&quot;</span>],</span><br><span class="line">    <span class="attr">allowHeaders</span>: [<span class="string">&quot;Content-Type&quot;</span>, <span class="string">&quot;Authorization&quot;</span>],</span><br><span class="line">  &#125;)</span><br><span class="line">);</span><br><span class="line"></span><br><span class="line"><span class="comment">// koa-cors中的配置项和跨域相关的响应头相对应</span></span><br><span class="line"><span class="comment">// origin。allowMethods、allowHeaders必须配置</span></span><br></pre></td></tr></table></figure>

<p>在Spring项目中，可以给<strong>Controller</strong>添加<code>@CrossOrigin</code>注解解决跨域问题：</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RestController</span></span><br><span class="line"><span class="meta">@RequestMapping(&quot;/user&quot;)</span></span><br><span class="line"><span class="meta">@CrossOrigin</span></span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">UserController</span> &#123;&#125;</span><br></pre></td></tr></table></figure>

<ol start="100">
<li><p>JavaScript 事件循环</p>
<p><img src="D:\typora-images\image-20250513173216579.png" alt="image-20250513173216579"></p>
<p>浏览器的主线程以事件循环为中心，用户交互、更新DOM树、渲染界面、执行JS脚本等事件都在事件循环中执行</p>
<ul>
<li><p>宏任务与微任务</p>
<p><img src="D:\typora-images\image-20250513175558783.png" alt="image-20250513175558783"></p>
</li>
<li><p>一轮事件循环的流程：</p>
<ol>
<li>执行同步代码</li>
<li>从任务队列取出<strong>一个</strong>宏任务并执行，遇到宏任务就放入任务队列，遇到微任务就放入微任务队列。</li>
<li>检查微任务队列，执行<strong>所有</strong>微任务，在执行过程中如果有新的微任务添加，则一并执行直到微任务队列为空。</li>
<li>进入<strong>更新渲染阶段</strong>，判断是否需要执行渲染，如果帧动画回调为空（即没有调用过<code>requestAnimationFrame()</code>），或者浏览器判断界面没有发生变化，浏览器将会跳过更新渲染阶段，以下流程也不会执行。</li>
<li>如果窗口大小发生改变，执行监听的<code>resize</code>方法。如果界面滑动，执行监听的<code>scroll</code>方法。（更新DOM）</li>
<li>执行帧动画回调，即<code>rAF</code>的回调</li>
<li>执行<code>IntersectionObserver</code>回调               </li>
<li><strong>重新渲染绘制界面</strong></li>
</ol>
</li>
<li><p><code>requestAnimationFrame()</code></p>
<p><code>rAF</code>是官方提供的用于执行流畅动画的API，<code>rAF</code>是更新DOM的最后机会，在<code>rAF</code>的回调执行完后，浏览器会立刻渲染绘制界面（前提是浏览器决定重绘）</p>
<ul>
<li><p>误解：宏任务之间一定伴随着重绘</p>
<p>假设我们想让屏幕快速闪烁红色和蓝色：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">setTimeout</span>(<span class="function">() =&gt;</span> &#123;</span><br><span class="line">  <span class="variable language_">document</span>.<span class="property">body</span>.<span class="property">style</span>.<span class="property">background</span> = <span class="string">&quot;red&quot;</span></span><br><span class="line">  <span class="built_in">setTimeout</span>(<span class="function">() =&gt;</span> &#123;</span><br><span class="line">    <span class="variable language_">document</span>.<span class="property">body</span>.<span class="property">style</span>.<span class="property">background</span> = <span class="string">&quot;blue&quot;</span></span><br><span class="line">  &#125;)</span><br><span class="line">&#125;)</span><br></pre></td></tr></table></figure>

<p>最终的行为将不可控，如果Task A执行时正好遇到了浏览器认定的渲染时机（队列中添加了一个高优先级的宏任务），就会正常闪烁。帧数越高，绘制间隔越短，成功率就越大。</p>
<p>如果采用<code>rAF</code>，动画将会很稳定的执行：</p>

<li><p>定时器<code>setTimeout()</code>一定准确吗？</p>
<p>不一定。<code>setTimeout()</code>会在指定时间值之后创建一个事件加入宏任务队列。如果队列为空，定时器的事件在加入队列后会被立即处理，此时定时器是准时的；如果队列不为空，定时器必须要等待其他消息处理完，此时定时器是不准确的。定时器准时与否取决于事件加入宏任务队列时，队列是否为空。</p>
</li>

<li>触发了一个事件event时（例如点击事件，键盘事件），其回调被添加到任务队列</li>
<li>执行定时器函数<code>setTimeout()</code>或<code>setInterval()</code>时，到达指定时间时，回调被添加到任务队列</li>
</ul>

<li><p>每一次事件循环只执行一个宏任务吗？</p>

<ol start="105">
<li><p>常见的状态码</p>
<p>状态码的作用是服务端在响应报文中，向客户端描述请求结果。</p>
<ul>
<li><strong>1xx（信息性状态码）</strong>：表示接收的请求正在处理。</li>
<li><strong>2xx（成功状态码）</strong>：表示请求正常处理完毕。<ul>
<li>200 OK：请求成功</li>
<li>204 No Content：请求成功，但没有结果返回</li>
<li>206 Partial Content：客户端请求一部分资源，服务端成功响应，返回一部分资源</li>
</ul>
</li>
<li><strong>3xx（重定向状态码）</strong>：需要后续操作才能完成这一请求。<ul>
<li>301 Move Permanently：永久重定向。请求的资源已被永久的移动到新URI，返回信息会包括新的URI，浏览器会自动定向到新URI。今后任何新的请求都应使用新的URI代替。</li>
<li>302 Found：临时重定向</li>
<li>303 See Other：查看其他地址，和301类似</li>
<li>304 Not Modified：请求附带了 <code>If-None-Match</code> 或<code>If-Modified-Since</code>请求头时，服务器返回304说明无需再次传输请求的内容，也就是说可以使用缓存。</li>
<li>307 Temporary Redirect：临时重定向，和302类似，使用GET请求重定向</li>
</ul>
</li>
<li><strong>4xx（客户端错误状态码）</strong>：表示请求包含语法错误或无法完成。<ul>
<li>400 Bad Request：请求报文语法错误</li>
<li>401 Unauthorized：认证失败</li>
<li>403 Forbidden：服务端拒绝执行</li>
<li>404 Not Found：服务器上找不到请求的资源</li>
</ul>
</li>
<li><strong>5xx（服务器错误状态码）</strong>：服务器在处理请求的过程中发生了错误。<ul>
<li>500 Internal Server Error：服务器内部错误，无法完成请求</li>
<li>503 Service Unavailable：服务器超负荷或维护，无法处理请求</li>
<li>502 Bad Gateway：服务器作为网关或代理服务器，从上游服务器收到无效响应</li>
</ul>
</li>
</ul>
</li>
</ol>

(target[key], handler)</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`访问了<span class="subst">$&#123;key&#125;</span>属性`</span>); <span class="comment">// 监听/代理</span></span><br><span class="line">      <span class="keyword">return</span> <span class="title class_">Reflect</span>.<span class="title function_">get</span>(target,key,receiver);</span><br><span class="line">    &#125;,</span><br><span class="line">    <span class="title function_">set</span>(<span class="params">target,key,value,receiver</span>)&#123;</span><br><span class="line">      <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`将<span class="subst">$&#123;key&#125;</span>属性由<span class="subst">$&#123;target[key]&#125;</span>改为<span class="subst">$&#123;value&#125;</span>`</span>); <span class="comment">// 监听/代理</span></span><br><span class="line">      <span class="title class_">Reflect</span>.<span class="title function_">set</span>(target,key,value,receiver);</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">return</span> <span class="keyword">new</span> <span class="title class_">Proxy</span>(target,handler);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> data = &#123;</span><br><span class="line">  <span class="attr">name</span>: <span class="string">&quot;ming&quot;</span>,</span><br><span class="line">  <span class="attr">age</span>: <span class="number">23</span>,</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> proxyData = <span class="title function_">reactive</span>(data);</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(proxyData.<span class="property">name</span>);</span><br><span class="line"><span class="comment">// 访问了name属性</span></span><br><span class="line"><span class="comment">// ming</span></span><br><span class="line">proxyData.<span class="property">age</span> = <span class="number">26</span>;</span><br><span class="line"><span class="comment">// 将age属性由23改为26</span></span><br><span class="line">proxyData.<span class="property">prop</span> = <span class="number">30</span>;</span><br><span class="line"><span class="comment">// 将prop属性由undefined改为30</span></span><br></pre></td></tr></table></figure></li>

<li><p>Vue如何收集依赖？</p>
<p>首先要介绍两个东西：Dep 和 Watcher</p>
<p>Watcher 就是依赖/依赖项，本质上是一个函数。依赖数据的地方有很多，例如模板、watch、computed函数，所以就需要抽象成一个单独的类，收集依赖的时候只需要收集一个封装好的类的实例即可，这个类就是 Watcher：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">class</span> <span class="title class_">Watcher</span> &#123;</span><br><span class="line">  <span class="comment">// cb 即依赖项更新的函数</span></span><br><span class="line">  <span class="title function_">constructor</span>(<span class="params">obj, key, cb</span>) &#123;</span><br><span class="line">    <span class="comment">// 将 Dep.target 指向自己</span></span><br><span class="line">    <span class="comment">// 然后触发属性的 getter，将自身添加到 Dep 中</span></span><br><span class="line">    <span class="comment">// 最后将 Dep.target 置空</span></span><br><span class="line">    <span class="title class_">Dep</span>.<span class="property">target</span> = <span class="variable language_">this</span></span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">cb</span> = cb</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">obj</span> = obj</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">key</span> = key</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">value</span> = obj[key]</span><br><span class="line">    <span class="title class_">Dep</span>.<span class="property">target</span> = <span class="literal">null</span></span><br><span class="line">  &#125;</span><br><span class="line">  <span class="title function_">update</span>(<span class="params"></span>) &#123;</span><br><span class="line">    <span class="comment">// 获得新值</span></span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">value</span> = <span class="variable language_">this</span>.<span class="property">obj</span>[<span class="variable language_">this</span>.<span class="property">key</span>]</span><br><span class="line">   <span class="comment">// 我们定义一个 cb 函数，这个函数用来模拟视图更新，调用它即代表更新视图</span></span><br><span class="line">    <span class="variable language_">this</span>.<span class="title function_">cb</span>(<span class="variable language_">this</span>.<span class="property">value</span>)</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>如何实现依赖项的更新？只需要重新执行一遍依赖项的语句即可，即上面的cb函数。举个例子：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> name = <span class="string">&quot;ming&quot;</span>,age = <span class="number">22</span>;</span><br><span class="line"><span class="keyword">let</span> str = <span class="string">`<span class="subst">$&#123;name&#125;</span>的年龄是<span class="subst">$&#123;age&#125;</span>岁`</span>;</span><br><span class="line">age = <span class="number">30</span>;</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(str);</span><br><span class="line"><span class="comment">// 预期结果：ming的年龄是30岁</span></span><br><span class="line"><span class="comment">// 实际结果：ming的年龄是22岁</span></span><br></pre></td></tr></table></figure>

<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> name = <span class="string">&quot;ming&quot;</span>,age = <span class="number">22</span>;</span><br><span class="line"><span class="keyword">let</span> str = <span class="string">&#x27;&#x27;</span>;</span><br><span class="line"><span class="keyword">const</span> <span class="title function_">cb</span> = (<span class="params"></span>) =&gt; str = <span class="string">`<span class="subst">$&#123;name&#125;</span>的年龄是<span class="subst">$&#123;age&#125;</span>岁`</span>;</span><br><span class="line"><span class="title function_">cb</span>();</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(str); <span class="comment">// ming的年龄是22岁</span></span><br><span class="line"></span><br><span class="line">age = <span class="number">30</span>;</span><br><span class="line"><span class="title function_">cb</span>();</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(str); <span class="comment">// ming的年龄是30岁</span></span><br></pre></td></tr></table></figure>

<p>Watcher 将依赖项作为函数收集起来，触发更新时，只需要执行一遍函数即可实现响应式更新。</p>
<hr>
<p>有了依赖项，还需要一个地方储存依赖项，它就是Dep，它用来储存/删除依赖，以及通知依赖项更新：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">class</span> <span class="title class_">Dep</span> &#123;</span><br><span class="line">    </span><br><span class="line">    <span class="comment">// 用于收集依赖</span></span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">target</span> = <span class="literal">null</span>;</span><br><span class="line"></span><br><span class="line">    <span class="comment">/* 用来存放Watcher对象的数组 */</span></span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">subs</span> = <span class="literal">null</span>;</span><br><span class="line"></span><br><span class="line">    <span class="comment">/* 在subs中添加一个Watcher对象 */</span></span><br><span class="line">    <span class="title function_">addSub</span> (sub) &#123;</span><br><span class="line">        <span class="variable language_">this</span>.<span class="property">subs</span>.<span class="title function_">push</span>(sub);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">/* 通知所有Watcher对象更新视图 */</span></span><br><span class="line">    <span class="title function_">notify</span> () &#123;</span><br><span class="line">        <span class="variable language_">this</span>.<span class="property">subs</span>.<span class="title function_">forEach</span>(<span class="function">(<span class="params">sub</span>) =&gt;</span> &#123;</span><br><span class="line">            sub.<span class="title function_">update</span>();</span><br><span class="line">        &#125;)</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>对于每个变量，用dep（使用<code>set</code>实现，目的是去重）收集其依赖项。对于一个对象，通过<code>Map</code>记录每个属性的依赖项。最后用<code>WeakMap</code>存储多个对象的依赖项，如图所示：</p>
<img src="D:\typora-images\image-20250522165453569.png" alt="image-20250522165453569" style="zoom:80%;" />

<img src="D:\typora-images\image-20250522165651890.png" alt="image-20250522165651890" style="zoom:80%;" />

<p>Vue用<code>track()</code>函数收集依赖，用<code>trigger()</code>函数触发更新，简化后的实现原理如下所示（vue2使用 Watcher 收集依赖，猜测vue3沿用 Watcher）：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 第一步：监听变量访问与更新</span></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">reactive</span>(<span class="params">target</span>) &#123;</span><br><span class="line">  <span class="keyword">const</span> handler = &#123;</span><br><span class="line">    <span class="title function_">get</span>(<span class="params">target, key, receiver</span>) &#123;</span><br><span class="line">      <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`访问了<span class="subst">$&#123;key&#125;</span>属性`</span>);</span><br><span class="line">      <span class="comment">// 第二步：变量被访问时收集依赖</span></span><br><span class="line">      <span class="title function_">track</span>(receiver, key);</span><br><span class="line">      <span class="comment">// 如果取的值是对象就对这个对象进行代理</span></span><br><span class="line">      <span class="keyword">if</span> (<span class="keyword">typeof</span> target[key] == <span class="string">&#x27;object&#x27;</span> &amp;&amp; target[key] !== <span class="literal">null</span>) &#123;</span><br><span class="line">        <span class="keyword">return</span> <span class="keyword">new</span> <span class="title class_">Proxy</span>(target[key], handler)</span><br><span class="line">      &#125;</span><br><span class="line">      </span><br><span class="line">      <span class="keyword">return</span> <span class="title class_">Reflect</span>.<span class="title function_">get</span>(target, key, receiver);</span><br><span class="line">    &#125;,</span><br><span class="line">    <span class="title function_">set</span>(<span class="params">target, key, value, receiver</span>) &#123;</span><br><span class="line">      <span class="title class_">Reflect</span>.<span class="title function_">set</span>(target, key, value, receiver);</span><br><span class="line">      <span class="title function_">trigger</span>(receiver, key);         <span class="comment">// 第三步：变量更新时触发依赖更新</span></span><br><span class="line">      <span class="comment">// 这里不返回true的话，给Proxy对象复制时会报错：&#x27;set&#x27; on proxy: trap returned falsish for property &#x27;name&#x27;</span></span><br><span class="line">      <span class="comment">// return true;</span></span><br><span class="line">    &#125;,</span><br><span class="line">  &#125;;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">return</span> <span class="keyword">new</span> <span class="title class_">Proxy</span>(target, handler);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> targetMap = <span class="keyword">new</span> <span class="title class_">WeakMap</span>();</span><br><span class="line"></span><br><span class="line"><span class="comment">// 在渲染阶段，Component Render Function(组件渲染函数)会构造Watcher对象，触发Proxy的get方法进而触发track方法收集依赖</span></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">Dep</span> &#123;</span><br><span class="line">    ...</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">target</span> = <span class="literal">null</span>;</span><br><span class="line">    ...</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">Watcher</span> &#123;</span><br><span class="line">  <span class="title function_">constructor</span>(<span class="params">obj, key, cb</span>) &#123;</span><br><span class="line">    <span class="comment">// 将 Dep.target 指向自己</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 最后将 Dep.target 置空</span></span><br><span class="line">    <span class="title class_">Dep</span>.<span class="property">target</span> = <span class="variable language_">this</span></span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">cb</span> = cb</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">obj</span> = obj</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">key</span> = key</span><br><span class="line">    <span class="comment">// 然后触发属性的 getter，进而触发track方法，将自身添加到Dep中</span></span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">value</span> = obj[key]</span><br><span class="line">    <span class="title class_">Dep</span>.<span class="property">target</span> = <span class="literal">null</span></span><br><span class="line">  &#125;</span><br><span class="line">  ...</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 收集依赖的逻辑</span></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">track</span>(<span class="params">target, key</span>) &#123;</span><br><span class="line">  <span class="keyword">let</span> depsMap = targetMap.<span class="title function_">get</span>(target);</span><br><span class="line">  <span class="keyword">if</span> (!depsMap) &#123;</span><br><span class="line">    targetMap.<span class="title function_">set</span>(target, (depsMap = <span class="keyword">new</span> <span class="title class_">Map</span>()));</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">let</span> dep = depsMap.<span class="title function_">get</span>(key);</span><br><span class="line">  <span class="keyword">if</span> (!dep) &#123;</span><br><span class="line">    depsMap.<span class="title function_">set</span>(key, (dep = <span class="keyword">new</span> <span class="title class_">Set</span>()));</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="comment">// 如果不判空，会在dep中添加null值。因为在赋值时会先调用getter再调用setter</span></span><br><span class="line">  <span class="keyword">if</span> (<span class="title class_">Dep</span>.<span class="property">target</span>) &#123;</span><br><span class="line">    dep.<span class="title function_">add</span>(<span class="title class_">Dep</span>.<span class="property">target</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 触发更新的逻辑</span></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">trigger</span>(<span class="params">target, key</span>) &#123;</span><br><span class="line">  <span class="keyword">let</span> depsMap = targetMap.<span class="title function_">get</span>(target);</span><br><span class="line">  <span class="keyword">if</span> (depsMap) &#123;</span><br><span class="line">    <span class="keyword">let</span> dep = depsMap.<span class="title function_">get</span>(key);</span><br><span class="line">    <span class="keyword">if</span> (dep) &#123;</span><br><span class="line">      dep.<span class="title function_">forEach</span>(<span class="function">(<span class="params">e</span>) =&gt;</span> <span class="title function_">e</span>());</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
</li>
<li></li>
</ul>
</li>
</ol>
<hr>
<ol start="109">
<li><p>axios二次封装，请求、响应拦截器分别封装了什么</p>
<ul>
<li><p>创建axios实例，配置baseurl、超时时间、请求头等参数</p>
</li>
<li><p>请求拦截器：</p>
<ol>
<li>数据格式转换，例如对象转为JSON格式</li>
<li>配置请求头</li>
</ol>
</li>
<li><p>响应拦截器：</p>
<ol>
<li>处理响应结果</li>
<li>异常处理，例如做个消息提醒</li>
</ol>
</li>
</ul>
</li>
</ol>
<hr>
<ol start="110">
<li><p>Vue 生命周期</p>
<img src="D:\typora-images\lifecycle_zh-CN.W0MNXI0C.png" alt="lifecycle_zh-CN.W0MNXI0C" style="zoom:50%;" />

<ul>
<li><strong>beforeCreate</strong>：组件实例化完成，并且<code>props</code>被解析后立刻调用。<strong>注意，仅选项式API可用</strong>。</li>
<li><strong>created</strong>：组件实例处理完所有状态相关的选项后调用。当这个钩子被调用时，以下内容已经设置完成：响应式数据、计算属性、方法和侦听器。此时还未开始挂载阶段。<strong>注意，仅选项式API可用</strong>。</li>
<li><strong>beforeMount</strong> / <strong>onBeforeMount()</strong>：组件即将挂载。和created类似，响应式状态设置完毕，但还没有创建DOM节点。</li>
<li><strong>mounted</strong> / <strong>onMounted()</strong>：组件及其子组件都已经被挂载，且DOM树已经创建完成并插入父容器中。此时是否渲染完成？（猜测还未渲染完成。下次渲染完成的回调是不是nexttick？）</li>
<li><strong>beforeUpdate</strong> / <strong>onBeforeUpdate()</strong>：在组件即将<strong>因为一个响应式状态变更</strong>（其他变更不会回调钩子，例如添加删除节点）而更新其 DOM 树之前调用。这个钩子可以用来在 Vue 更新 DOM 之前访问 DOM 状态。在这个钩子中更改状态也是安全的。</li>
<li><strong>updated</strong> / <strong>onUpdated()</strong>：组件的任意DOM更新（必须是响应式状态更新）后调用，父组件的更新钩子在子组件的更新钩子之后调用。</li>
<li><strong>beforeUnmount</strong> / <strong>onBeforeUnmount()</strong>：在组件即将被卸载前调用的钩子。</li>
<li><strong>unmounted</strong> / <strong>onUnmounted()</strong>：当组件的所有子组件被卸载，且所有响应式状态（响应式变量、计算属性、侦听器）停止工作后调用。可以在这个钩子中手动清理一些副作用，例如计时器、DOM 事件监听器或者与服务器的连接。</li>
</ul>
</li>
</ol>
<hr>
<ol start="111">
<li><p><code>&lt;script setup&gt;</code>的执行时机，作用</p>
<p>在组件的生命周期中最早执行，作用是初始化响应式变量、计算属性、侦听器等响应式状态。</p>
</li>
</ol>
<hr>
<ol start="112">
<li><p>vue2和vue3的区别</p>
<ul>
<li><p>vue2只支持选项式API（Options API），vue3推出组合式API（Composition API）。</p>
<p>选项式API容易上手，但逻辑散乱（data变量、methods方法、computed计算属性、生命周期钩子等需要分开定义）</p>
<p>组合式API自由度更高，代码的可读性、内聚性更强。</p>
<p>个人认为 组合式API 优于 选项式API。</p>
</li>
<li><p>响应式实现原理不同</p>
<p>vue2对于get和set方法的监听，通过<code>defineProperty()</code>实现，它的第一个缺点是监听不到属性的新增和删除；第二个缺点是不能监听数组的变化；第三个缺点是因为<code>defineProperty()</code>是针对属性的，需要给对象的每个属性调用一遍，当属性过多时可能存在性能问题。</p>
<p>vue3基于<code>proxy</code>实现对象代理，解决了<code>defineProperty()</code>的缺点。它支持属性增删的监听，支持数组代理，同时对于同级属性，做一次代理即可，不需要重复调用。</p>
</li>
<li><p>diff算法的实现不同</p>
<p>vue2首先会进行头头、尾尾、头尾、尾头比较，命中直接复用，都没命中就去旧节点列表遍历，命中就复用，还没命中说明是新节点，就新建一个节点。</p>
<p>vue3首先进行头头、尾尾比较。对于剩余的节点，如果只有新节点有剩余，就直接创建；如果只有旧节点有剩余，就直接删除。如果新旧都有剩余，那就先拿到新节点在旧节点数组中的下标，得到一个下标数组，再找到这个下标数组的最长递增子序列，在这个序列里的节点直接复用，剩余的节点进行移动/插入/删除。</p>
<p>使用最长递增子序列可以最大程度的减少 DOM 的操作次数。</p>
</li>
</ul>
</li>
</ol>

<p>答：功能重复。filter能实现的功能，computed、自定义函数也都能实现。</p>
</li>
</ol>

<li><p>**nexttick()**的作用：在下一次DOM更新后执行某些操作。</p>
<p>先看一个例子：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">&lt;template&gt;</span><br><span class="line">  <span class="language-xml"><span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">&quot;test&quot;</span>&gt;</span>&#123;&#123; val &#125;&#125;<span class="tag">&lt;/<span class="name">div</span>&gt;</span></span></span><br><span class="line">&lt;/template&gt;</span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> val = <span class="title function_">ref</span>(<span class="number">0</span>);</span><br><span class="line"><span class="title function_">onMounted</span>(<span class="function">()=&gt;</span>&#123;</span><br><span class="line">  <span class="keyword">const</span> div = <span class="variable language_">document</span>.<span class="title function_">querySelector</span>(<span class="string">&quot;#test&quot;</span>);</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`更改前：<span class="subst">$&#123;div.textContent&#125;</span>`</span>);</span><br><span class="line">  val.<span class="property">value</span> = <span class="number">1</span>;</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`更改后：<span class="subst">$&#123;div.textContent&#125;</span>`</span>); <span class="comment">// 输出为0</span></span><br><span class="line">  <span class="title function_">nextTick</span>(<span class="function">()=&gt;</span>&#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`调用nexttick,更改后：<span class="subst">$&#123;div.textContent&#125;</span>`</span>); <span class="comment">// 输出1</span></span><br><span class="line">  &#125;);</span><br><span class="line">&#125;)</span><br></pre></td></tr></table></figure>

<p>修改响应式变量的值后，我们马上打印DOM的值，打印的仍然是旧值。我们了解到，更改响应式变量后，DOM并没有马上更新。</p>
