<li><p>**nexttick()**的原理</p>
<p>我们通过源码来分析执行流程：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">export</span> <span class="keyword">const</span> nextTick = (<span class="keyword">function</span> (<span class="params"></span>) &#123;</span><br><span class="line">  <span class="comment">// 储存传入的回调的数组</span></span><br><span class="line">  <span class="keyword">var</span> callbacks = []</span><br><span class="line">  <span class="comment">// 保证一次事件循环只添加一个`microTask`</span></span><br><span class="line">  <span class="keyword">var</span> pending = <span class="literal">false</span></span><br><span class="line">  <span class="comment">// 触发新添加节点更新的函数</span></span><br><span class="line">  <span class="keyword">var</span> timerFunc</span><br><span class="line">  <span class="keyword">function</span> <span class="title function_">nextTickHandler</span> (<span class="params"></span>) &#123;</span><br><span class="line">    <span class="comment">// 此时task，也就是同步代码已经执行完了，即将开始下次循环，重置pending标志</span></span><br><span class="line">    pending = <span class="literal">false</span></span><br><span class="line">    <span class="comment">// 之所以要slice复制一份出来是因为有的cb执行过程中又会往callbacks中加入内容</span></span><br><span class="line">    <span class="comment">// 比如$nextTick的回调函数里又有$nextTick</span></span><br><span class="line">    <span class="comment">// 这些是应该放入到下一个轮次的nextTick去执行的,</span></span><br><span class="line">    <span class="comment">// 所以拷贝一份当前的,遍历执行完当前的即可</span></span><br><span class="line">    <span class="keyword">var</span> copies = callbacks.<span class="title function_">slice</span>(<span class="number">0</span>)</span><br><span class="line">    callbacks = []</span><br><span class="line">    <span class="keyword">for</span> (<span class="keyword">var</span> i = <span class="number">0</span>; i &lt; copies.<span class="property">length</span>; i++) &#123;</span><br><span class="line">      copies[i]()</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* istanbul ignore if */</span></span><br><span class="line">  <span class="comment">// ios9.3以上的WebView的MutationObserver有bug，</span></span><br><span class="line">  <span class="comment">//所以在hasMutationObserverBug中存放了是否是这种情况</span></span><br><span class="line">  <span class="keyword">if</span> (<span class="keyword">typeof</span> <span class="title class_">MutationObserver</span> !== <span class="string">&#x27;undefined&#x27;</span> &amp;&amp; !hasMutationObserverBug) &#123;</span><br><span class="line">    <span class="keyword">var</span> counter = <span class="number">1</span></span><br><span class="line">    <span class="comment">// 创建一个MutationObserver,observer监听到dom改动之后后执行回调nextTickHandler</span></span><br><span class="line">    <span class="keyword">var</span> observer = <span class="keyword">new</span> <span class="title class_">MutationObserver</span>(nextTickHandler)</span><br><span class="line">    <span class="keyword">var</span> textNode = <span class="variable language_">document</span>.<span class="title function_">createTextNode</span>(counter)</span><br><span class="line">    <span class="comment">// 调用MutationObserver的接口,观测文本节点的字符内容</span></span><br><span class="line">    observer.<span class="title function_">observe</span>(textNode, &#123;</span><br><span class="line">      <span class="attr">characterData</span>: <span class="literal">true</span></span><br><span class="line">    &#125;)</span><br><span class="line">    <span class="comment">// 每次执行timerFunc都会让文本节点的内容在0/1之间切换</span></span><br><span class="line">    timerFunc = <span class="keyword">function</span> (<span class="params"></span>) &#123;</span><br><span class="line">      counter = (counter + <span class="number">1</span>) % <span class="number">2</span></span><br><span class="line">      textNode.<span class="property">data</span> = counter</span><br><span class="line">    &#125;</span><br><span class="line">  &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">    <span class="comment">// webpack attempts to inject a shim for setImmediate</span></span><br><span class="line">    <span class="comment">// if it is used as a global, so we have to work around that to</span></span><br><span class="line">    <span class="comment">// avoid bundling unnecessary code.</span></span><br><span class="line">    <span class="comment">// webpack默认会在代码中插入setImmediate的垫片</span></span><br><span class="line">    <span class="comment">// 没有MutationObserver就优先用setImmediate，不行再用setTimeout</span></span><br><span class="line">    <span class="keyword">const</span> context = inBrowser</span><br><span class="line">      ? <span class="variable language_">window</span></span><br><span class="line">      : <span class="keyword">typeof</span> <span class="variable language_">global</span> !== <span class="string">&#x27;undefined&#x27;</span> ? <span class="variable language_">global</span> : &#123;&#125;</span><br><span class="line">    timerFunc = context.<span class="property">setImmediate</span> || <span class="built_in">setTimeout</span></span><br><span class="line">  &#125;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">// 调用nexttick()实际执行的函数</span></span><br><span class="line">  <span class="keyword">return</span> <span class="keyword">function</span> (<span class="params">cb, ctx</span>) &#123;</span><br><span class="line">    <span class="comment">// 首先将回调添加到callback数组</span></span><br><span class="line">    <span class="keyword">var</span> func = ctx</span><br><span class="line">      ? <span class="keyword">function</span> (<span class="params"></span>) &#123; cb.<span class="title function_">call</span>(ctx) &#125;</span><br><span class="line">      : cb</span><br><span class="line">    callbacks.<span class="title function_">push</span>(func)</ <p>首先要说一下上面的写法，举例如下：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">export</span> <span class="keyword">const</span> a = (<span class="keyword">function</span> (<span class="params"></span>) &#123;</span><br><span class="line">    <span class="keyword">let</span> num = <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">return</span> <span class="keyword">function</span>(<span class="params"></span>)&#123;</span><br><span class="line">        num++;</span><br><span class="line">        <span class="variable language_">console</span>.<span class="title function_">log</span>(num);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;)();</span><br><span class="line"></span><br><span class="line"><span class="comment">// 此时如果多次调用a()，打印出的num值递增。所以猜测num是一个局部全局变量（?）。仅在a()内部可用，且被所有a()调用共享。</span></span><br><span class="line"><span class="title function_">a</span>(); <span class="comment">// 2</span></span><br><span class="line"><span class="title function_">a</span>(); <span class="comment">// 3</span></span><br><span class="line"><span class="title function_">a</span>(); <span class="comment">// 4</span></span><br></pre></td></tr></table></figure>

<p>因此<code>pending</code>和<code>callback[]</code>并不会在每次调用<code>nexttick()</code>时都初始化。</p>

<p>通过源码了解到，<code>nexttick()</code>的作用/原理就是将回调作为<code>microTask</code>添加到微任务队列。但是这还不足以解释<code>nexttick()</code>为什么能保证在DOM更新后执行。</p>
<p>我们还需要了解DOM更新的时机（先了解事件循环机制、task/microTask的执行过程、Vue响应式原理）：</p>
<img src="D:\typora-images\image-20250527174348249.png" alt="image-20250527174348249" style="zoom: 80%;" />

<ol>
<li><p>在我们修改响应式变量a后，通知所有订阅a的<code>watcher</code>，每一个<code>watcher</code>把自己放入待更新的数组。</p>
</li>
<li><p>随后执行<code>nexttick(flushBatcherQueue)</code>，<code>flushBatcherQueue</code>会触发每一个<code>watcher</code>的更新，也就是更新DOM，通过<code>nexttick</code>将更新DOM的操作传入微任务队列，作为<code>microTask</code>执行。</p>
<p>所以我们了解到，DOM的更新操作也是通过<code>microTask</code>实现的。</p>
</li>
<li><p>我们再调用<code>nexttick()</code>，回调会添加到<code>callback</code>数组中，先添加的<code>flushBatcherQueue</code>，后添加的用户回调，所以用户回调自然会在DOM更新之后执行了</p>
</li>

<li><p>上述流程为什么同时用到Redis、MySQL？</p>
<p><strong>MySQL</strong>是关系型数据库，存储在磁盘中**；**<strong>Redis</strong>是非关系型数据库，存储在内存中。</p>
<p>当使用<strong>token</strong>进行登录时，服务器要多次进行通过token获取用户信息的操作，Redis k-v的存储结构、内存存储的高性能非常适合这一场景。并且token还需具备有效期，Redis也有相应的功能支持。</p>
<p>数据量不大，对性能要求较高，数据关系简单（例如k-v）的场景适合使用Redis；数据量大、持久化存储数据，且数据具有复杂关系的场景，适合使用MySQL。</p>
<p>实际上Redis和MySQL通常配套使用，类似缓存的两个层级。</p>

<ol start="128">
<li><p>给用户表添加标签字段，如何修改用户表？</p>
<p><u>两种方案</u>：</p>
<ol>
<li>直接给用户表添加<code>tags</code>字段，使用例如<code>[Java,男,前端]</code>的JSON字符串记录标签。</li>
<li>使用关联表，记录用户和标签的关系。</li>
</ol>
<p>分析两种方案的<u>优缺点</u>：</p>
<ul>
<li>第一种方案的优点是方便修改，直接给表加个字段就行；并且根据用户查标签的操作效率高，查用户的时候就把标签带出来了。如果要根据标签查用户，需要用到 like 模糊匹配，性能稍差（20w条数据以内没问题）。</li>
<li>第二种方案的优点是便于反查，即根据标签查用户，缺点是需要再创建一个表，修改、维护成本较高，并且很影响扩展性。</li>
</ul>
<p>选择时，首先要考虑<strong>实际场景</strong>。当前场景中，查询用户标签频率高，根据标签查用户的情况较少。对于模糊匹配的性能问题可以使用redis缓存缓解，综合考虑修改维护成本、性能，选择方案一。</p>
<p>企业大型项目尽量减少关联查询。</p>
</li>
</ol>

<li><p>JS <strong>new</strong>一个函数的流程</p>
<p>new一个函数，相当于把这个函数作为构造函数执行，构建一个对象</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">function</span> <span class="title function_">test</span>(<span class="params">a, b</span>) &#123;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">a</span> = a;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">b</span> = b;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> p = <span class="keyword">new</span> <span class="title function_">test</span>(<span class="string">&quot;1&quot;</span>, <span class="number">3</span>);</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(p);</span><br></pre></td></tr></table></figure>

<p>new关键字将执行以下操作：</p>
<ol>
<li>创建一个新对象，称作p</li>
<li>将p的prototype属性设置为函数的prototype属性</li>
<li>使用给定参数执行构造函数，将函数的this指向p，执行给p设置属性等初始化操作。</li>
<li>如果构造函数未返回值，new表达式返回新对象p；如果构造函数返回值，就会成为new表达式的返回值，覆盖对象创建的流程。</li>
</ol>
<p>如果new的函数是箭头函数呢？</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> <span class="title function_">test</span> = (<span class="params">a, b</span>) =&gt; &#123;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">a</span> = a;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">b</span> = b;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> p = <span class="keyword">new</span> <span class="title function_">test</span>(<span class="string">&quot;1&quot;</span>, <span class="number">3</span>);</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(p);</span><br></pre></td></tr></table></figure>

<p>报错：<img src="D:\typora-images\image-20250918151115708.png" alt="image-20250918151115708"></p>
<p>因为箭头函数没有this属性，也没有prototype属性，所以2 3步都是无法进行的</p>
<p>严格来讲，第二步不会报错，第三步才会报错。（猜测）</p>
</li>
</ol>
<hr>
<ol start="168">
<li><p>箭头函数、普通函数，有什么区别？</p>
<p>箭头函数是<strong>ES6</strong>新增的使用箭头（=&gt;）定义函数的方式，它的语法比传统的函数表达式更简洁。</p>
<ol>
<li><p>更简洁的语法</p>
<p>如果只有一个参数，可以不加括号；</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> <span class="title function_">fn</span> = x =&gt; &#123; <span class="keyword">return</span> x * <span class="number">3</span> &#125;;</span><br></pre></td></tr></table></figure>

<p>如果函数体只有一个表达式，可以省略大括号；</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> <span class="title function_">fn</span> = x =&gt; x * <span class="number">3</span>;</span><br></pre></td></tr></table></figure>
</li>
<li><p>箭头函数没有 this 属性</p>
<p>所有函数执行时，都会创建一个执行上下文（栈帧），普通函数的上下文中存在 this 变量。</p>
<p>this 变量的值取决于函数的调用方式，如果被一个对象调用，那么this就指向这个对象；否则this一般指向<code>window</code>或 undefined（严格模式下）</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> name = <span class="string">&quot;window&quot;</span>;</span><br><span class="line"><span class="keyword">let</span> test = &#123;</span><br><span class="line">  <span class="attr">name</span>: <span class="string">&quot;hello&quot;</span>,</span><br><span class="line">  <span class="attr">testThis</span>: <span class="keyword">function</span> (<span class="params"></span>) &#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="variable language_">this</span>.<span class="property">name</span>);</span><br><span class="line">  &#125;,</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line">test.<span class="title function_">testThis</span>(); <span class="comment">// 打印结果：hello, window -&gt; test -&gt; testThis, 由test调用</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> tt = test.<span class="property">testThis</span>;</span><br><span class="line"><span class="title function_">tt</span>(); <span class="comment">// 打印结果：window, window -&gt; testThis, 由window调用</span></span><br></pre></td></tr></table></figure>

<p>箭头函数则是直接使用<strong>定义时所处的执行上下文</strong>的this变量，并且this在函数定义后不会改变（可以理解成一个常量，不能像普通函数那样动态绑定 this）。</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> id = <span class="string">&#x27;Global&#x27;</span></span><br><span class="line"> </span><br><span class="line"><span class="comment">// 箭头函数定义在全局作用域</span></span><br><span class="line"><span class="keyword">let</span> <span class="title function_">fun1</span> = (<span class="params"></span>) =&gt; &#123;</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="variable language_">this</span>.<span class="property">id</span>)</span><br><span class="line">&#125;</span><br><span class="line"> </span><br><span class="line"><span class="title function_">fun1</span>() <span class="comment">// &#x27;Global&#x27;</span></span><br></pre></td></tr></table></figure>

<p>当箭头函数在对象中定义时，存在两种情况</p>
<ul>
<li><p>字面量对象中定义箭头函数：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">var</span> name = <span class="string">&#x27;GLOBAL&#x27;</span>;</span><br><span class="line"><span class="keyword">var</span> obj = &#123;</span><br><span class="line">    <span class="attr">name</span>: <span class="string">&#x27;Anchor&#x27;</span>,</span><br><span class="line">    <span class="attr">getName</span>: <span class="function">() =&gt;</span> &#123;</span><br><span class="line">        <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="variable language_">this</span>.<span class="property">name</span>);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line">obj.<span class="title function_">getName</span>();    <span class="comment">// &#x27;GLOBAL&#x27;</span></span><br></pre></td></tr></table></figure>

<p>由于字面量对象定义时，不构成单独的执行上下文（调用对象的函数时才构成），所以字面量对象中定义的箭头函数所处的上下文是全局作用域，this 指向window。</p>
<p>所以在需要动态绑定this的场景，不应该使用箭头函数，应使用普通函数。</p>
</li>
<li><p>在类中定义箭头函数：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">class</span> <span class="title class_">C</span> &#123;</span><br><span class="line">  <span class="title function_">constructor</span>(<span class="params">a</span>) &#123;</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">a</span> = a;</span><br><span class="line">  &#125;</span><br><span class="line">  hello = <span class="function">() =&gt;</span> &#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`hello <span class="subst">$&#123;<span class="variable language_">this</span>.a&#125;</span>`</span>);</span><br><span class="line">  &#125;;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> p = <span class="keyword">new</span> <span class="title function_">C</span>(<span class="string">&quot;Anchor&quot;</span>);</span><br><span class="line">p.<span class="title function_">hello</span>();               <span class="comment">// hello Anchor</span></span><br></pre></td></tr></table></figure>

<p>类字段是在实例上定义的，类实例具有独立上下文，所以类中定义的箭头函数的执行上下文就是类实例，此时this能正确指向对象实例。</p>
<p>但是由于箭头函数的this值不会根据上下文变化而改变，所以会出现以下情况：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">class</span> <span class="title class_">C</span> &#123;</span><br><span class="line">  <span class="title function_">constructor</span>(<span class="params">a</span>) &#123;</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">a</span> = a;</span><br><span class="line">  &#125;</span><br><span class="line">  hello = <span class="function">() =&gt;</span> &#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`hello <span class="subst">$&#123;<span class="variable language_">this</span>.a&#125;</span>`</span>);</span><br><span class="line">  &#125;;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> p = <span class="keyword">new</span> <span class="title function_">C</span>(<span class="string">&quot;Anchor&quot;</span>);</span><br><span class="line"><span class="keyword">const</span> &#123; hello &#125; = p;  <span class="comment">// 析构赋值</span></span><br><span class="line"><span class="title function_">hello</span>();              <span class="comment">// hello Anchor</span></span><br></pre></td></tr></table></figure>

<p>原因还是箭头函数this值不会改变，不能进行动态绑定。如果是普通函数：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">class</span> <span class="title class_">C</span> &#123;</span><br><span class="line">  <span class="title function_">constructor</span>(<span class="params">a</span>) &#123;</span><br><span class="line">    <span class="variable language_">this</span>.<span class="property">a</span> = a;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="title function_">hello</span>(<span class="params"></span>) &#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">`hello <span class="subst">$&#123;<span class="variable language_">this</span>.a&#125;</span>`</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> p = <span class="keyword">new</span> <span class="title function_">C</span>(<span class="string">&quot;Anchor&quot;</span>);</span><br><span class="line"><span class="keyword">const</span> &#123; hello &#125; = p;</span><br><span class="line"><span class="title function_">hello</span>();</span><br></pre></td></tr></table></figure>

<p>结果：<img src="D:\typora-images\image-20250918154511227.png" alt="image-20250918154511227"></p>
<p>结果在预期内，说明函数未绑定this，读取this.a的时候报错。</p>
</li>
</ul>
</li>
<li><p>箭头函数没有prototype属性</p>
</li>
<li><p>箭头函数不能使用arguments对象，但能使用ES6的rest参数：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> <span class="title function_">fn</span> = (<span class="params">...args</span>) =&gt; <span class="variable language_">console</span>.<span class="title function_">log</span>(args);</span><br><span class="line"><span class="title function_">fn</span>(<span class="string">&#x27;Anchor&#x27;</span>, <span class="number">18</span>);</span><br></pre></td></tr></table></figure>

<p><img src="D:\typora-images\image-20250918155843249.png" alt="image-20250918155843249"></p>
</li>
<li><p>适用的场景：简化回调函数</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 普通函数写法</span></span><br><span class="line"><span class="keyword">var</span> result = arr.<span class="title function_">sort</span>(<span class="keyword">function</span> (<span class="params">a, b</span>) &#123;</span><br><span class="line">  <span class="keyword">return</span> a - b;</span><br><span class="line">&#125;);</span><br><span class="line"> </span><br><span class="line"><span class="comment">// 箭头函数写法</span></span><br><span class="line"><span class="keyword">var</span> result = arr.<span class="title function_">sort</span>(<span class="function">(<span class="params">a, b</span>) =&gt;</span> a - b);</span><br></pre></td></tr></table></figure>

<p>不适用的场景：</p>
<ol>
<li>字面量对象的方法，且方法内使用this</li>
<li>需要动态变化this的场景</li>
</ol>
</li>
</ol>
</li>
</ol>

<ol start="169">
<li><p>JS 异常处理</p>
<p><strong>前端错误分类</strong></p>
<p>按<u>错误类型</u>分类：</p>
<ul>
<li><p>脚本错误：JavaScript代码中的逻辑错误、语法错误、运行时错误</p>
</li>
<li><p>网络错误：浏览器进行网络请求时发生错误，例如<code>404 Not Found</code>、<code>500 Internal Server Error</code>等常见错误</p>
</li>
<li><p>资源加载错误：图片、样式表、脚本加载失败</p>
</li>
<li><p>第三方库/框架错误</p>
</li>
</ul>
<p>按<u>同步/异步</u>分类：</p>
<ul>
<li>同步错误</li>
<li>异步错误</li>
</ul>
<p><strong>如何捕获异常？</strong></p>
<p>对于同步错误：</p>
<ul>
<li><p><code>try...catch</code>语句：JS捕获异常最基本的方式</p>
</li>
<li><p><code>addEventListener(&#39;error&#39;)</code>：可以给<code>window</code>添加，全局捕获未处理的同步异常；也可以为特定元素例如<code>&lt;img&gt;</code>添加，来捕获资源加载异常：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 全局错误捕获（浏览器端）</span></span><br><span class="line"><span class="variable language_">window</span>.<span class="title function_">addEventListener</span>(<span class="string">&#x27;error&#x27;</span>, <span class="function"><span class="params">event</span> =&gt;</span> &#123;</span><br><span class="line">  <span class="comment">// 阻止默认错误提示</span></span><br><span class="line">  event.<span class="title function_">preventDefault</span>()</span><br><span class="line">  </span><br><span class="line">  <span class="keyword">const</span> errorData = &#123;</span><br><span class="line">    <span class="attr">message</span>: event.<span class="property">message</span>,</span><br><span class="line">    <span class="attr">filename</span>: event.<span class="property">filename</span>,</span><br><span class="line">    <span class="attr">lineno</span>: event.<span class="property">lineno</span>,</span><br><span class="line">    <span class="attr">colno</span>: event.<span class="property">colno</span>,</span><br><span class="line">    <span class="attr">stack</span>: event.<span class="property">error</span>?.<span class="property">stack</span>,</span><br><span class="line">    <span class="attr">type</span>: <span class="string">&#x27;UNHANDLED_ERROR&#x27;</span></span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 发送错误日志</span></span><br><span class="line">  navigator.<span class="title function_">sendBeacon</span>(<span class="string">&#x27;/error-log&#x27;</span>, <span class="title class_">JSON</span>.<span class="title function_">stringify</span>(errorData))</span><br><span class="line">  </span><br><span class="line">  <span class="comment">// 显示友好提示</span></span><br><span class="line">  <span class="title function_">showErrorToast</span>(<span class="string">&#x27;系统开小差了，请稍后再试&#x27;</span>)</span><br><span class="line">&#125;)</span><br></pre></td></tr></table></figure></li>
</ul>
<p>对于异步错误：</p>
<ul>
<li><p><code>Promise.catch()</code>：对于使用Promise的异步操作，使用<code>.catch</code>捕获异常：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="title function_">fetch</span>(<span class="string">&#x27;some_url&#x27;</span>)</span><br><span class="line">    .<span class="title function_">then</span>(<span class="function"><span class="params">response</span> =&gt;</span> &#123; <span class="comment">/* 处理成功响应 */</span> &#125;)</span><br><span class="line">    .<span class="title function_">catch</span>(<span class="function"><span class="params">error</span> =&gt;</span> &#123;</span><br><span class="line">        <span class="variable language_">console</span>.<span class="title function_">error</span>(<span class="string">&quot;Fetch error:&quot;</span>, error);</span><br><span class="line">    &#125;);</span><br></pre></td></tr></table></figure>
</li>
<li><p><code>async/await/try...catch</code>搭配使用：相比上一种方式，使用起来更方便、更优雅，内部基于Promise实现：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">async</span> <span class="keyword">function</span> <span class="title function_">test</span> (<span class="params"></span>) &#123;</span><br><span class="line">  <span class="keyword">try</span> &#123;</span><br><span class="line">    <span class="keyword">const</span> res = <span class="keyword">await</span> <span class="title function_">fetch</span>();</span><br><span class="line">  &#125; <span class="keyword">catch</span>(e) &#123;</span><br><span class="line">    <span class="variable language_">console</span>.<span class="title function_">log</span>(e, <span class="string">&#x27;e.message&#x27;</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
</li>
<li><p><code>window.addEventListener(&#39;unhandledrejection&#39;)</code>：</p>
<blockquote>
<p>当 <a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Global_Objects/Promise"><code>Promise</code></a> 被 reject 且没有 reject 处理器的时候，会触发 <strong><code>unhandledrejection</code></strong> 事件；这可能发生在 <a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/API/Window"><code>window</code></a> 下，但也可能发生在 <a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/API/Worker"><code>Worker</code></a> 中。这对于调试和为意外情况提供后备错误处理非常有用。</p>
<p>---MDN</p>
</blockquote>
<p>通过<code>window.addEventListener(&#39;error&#39;)</code>全局拦截同步异常，<code>window.addEventListener(&#39;unhandledrejection&#39;)</code>全局拦截异步异常，避免出现异常不被捕获的情况：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="variable language_">window</span>.<span class="title function_">addEventListener</span>(<span class="string">&quot;unhandledrejection&quot;</span>, <span class="function">(<span class="params">pre</span>) =&gt;</span> &#123;</span><br><span class="line">  pre.<span class="title function_">preventDefault</span>();</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(pre.<span class="property">promise</span>); <span class="comment">// 处理出现异常的promise</span></span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(pre.<span class="property">reason</span>);</span><br><span class="line">&#125;);</span><br></pre></td></tr></table></figure>

<p><code>unhandledrejection</code>事件的回调传入的参数<code>PromiseRejectionEvent</code>包含两个参数：</p>
<ul>
<li>promise：出现异常且未处理的promise。未处理是指promise未调用 <a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Global_Objects/Promise/then"><code>Promise.then()</code></a>、<a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Global_Objects/Promise/catch"><code>Promise.catch()</code></a> 或 <a target="_blank" rel="noopener" href="https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Global_Objects/Promise/finally"><code>Promise.finally()</code></a>。注意，<code>Promise.then()</code>接收两个参数，用于 <code>Promise</code> 兑现和拒绝情况的回调函数，所以<code>Promise.then()</code>可以用来处理异常。</li>
<li>reason：异常原因（可能不存在）。</li>
</ul>
</li>
</ul>
<p><strong>全局异常处理</strong>：</p>
<p>通过<code>window.addEventListener(&#39;error&#39;)</code>全局拦截同步异常，<code>window.addEventListener(&#39;unhandledrejection&#39;)</code>全局拦截异步异常，或者使用某些全局异常处理框架，避免出现异常不被捕获的情况。</p>
<p><strong>异常处理框架：</strong>（todo）</p>
</li>
</ol>

<ol start="173">
<li><p>编译型、解释型语言</p>
<p>使用编程语言编写的源代码，我们可以轻松理解，但对于计算机硬件，源代码就是天书，根本无法执行，需要转换成特定的二进制指令，即机器码。</p>
<p>所谓的二进制指令，也就是机器码，是 CPU 能够识别的硬件层面的“代码”。</p>
<p>一门编程语言是编译型还是解释型，取决于将源代码转换成机器码的时机：</p>
<ul>
<li><strong>编译型</strong>：要求必须提前将所有源代码一次性转换成机器码，也就是生成一个可执行程序，比如C、C++、Golang</li>
<li><strong>解释型</strong>：一边执行一边转换，不会生成可执行程序，例如Python、JavaScript</li>
</ul>
</li>
</ol>

<ol start="174">
<li>Java web worker</li>
</ol>
<hr>
<ol start="175">
<li><p>JavaScript 执行模型</p>
<ul>
<li><p>浏览器中的每个标签、每一个web worker线程都是一个<strong>代理</strong>，每个代理都有自己的代码执行器，由以下几个部分组成：</p>
<ol>
<li><strong>堆</strong>：内存中的一大片区域（通常是非结构化的），用来储存对象。每个堆都有缓冲区（<code>SharedArrayBuffer</code>对象），缓冲区代表的底层内存是共享的。</li>
<li><strong>消息队列</strong>：即 JavaScript 的<u>事件循环</u>，用来实现 JavaScript 的异步编程、同时也是单线程的。</li>
<li><strong>栈（执行上下文）</strong>：调用栈，执行消息队列中的任务，每个任务进入时，会创建一个执行上下文（栈帧），退出时会清空。</li>
</ol>
<p><img src="D:\typora-images\image-20251009170532876.png" alt="image-20251009170532876"></p>
</li>
</ul>
</li>
</ol>
<hr>
<ol start="176">
<li><p>线程、浏览器标签、代理、域的关系</p>
<p>一个标签对应一个线程对应一个代理，每个代理可以拥有多个域（realm），每个同源窗口都有独立的域，但是共享同一个代理</p>
</li>
</ol>
<hr>
<ol start="177">
<li><p>JavaScript 执行上下文、闭包</p>
<p><u>执行上下文的概念</u></p>
<p>当一段 JavaScript 代码运行时，它实际上是运行在执行上下文中。执行上下文也可叫执行环境、作用域等。执行上下文分为以下几类：</p>
<ul>
<li><p><strong>全局执行上下文</strong>：为运行代码主体创建的执行上下文，也就是为了运行函数以外的代码而创建的。</p>
</li>
<li><p><strong>函数执行上下文</strong>：每个函数在运行时都会创建自己的执行上下文，即<strong>栈帧</strong>。</p>
</li>
<li><p><strong>Eval 函数执行上下文</strong></p>
</li>
</ul>
<p><u>执行上下文的组成</u></p>
<ul>
<li><p><strong><code>this</code>变量</strong>：在全局上下文中，this 指向 window 对象；在函数执行上下文中，this 取决于函数的调用方式，如果被一个对象调用，this 就指向这个对象，</p>
<p>否则 this 一般指向 window 对象或 undefined（严格模式） </p>
</li>
<li><p><strong>词法环境</strong>：由环境记录器和外部环境引用组成，环境记录器用于存储当前环境的变量和函数声明；外部环境引用对应着可以访问外部环境，全局上下文中外部环境引用为 null。</p>
</li>
<li><p><strong>变量环境</strong>：和词法环境类似，但是只用来存储var变量，一般用不到。</p>
</li>
</ul>
<p><u>闭包</u></p>
<p>闭包随着函数的创建而创建，由<strong>函数</strong>和<strong>函数所处环境的词法环境</strong>组成，闭包 = 函数+执行上下文+外部执行上下文。所以闭包可以让函数访问外部作用域。</p>
</li>
</ol>

<ol start="180">
<li>Git 中的工作区、暂存区、本地仓库和远程仓库<ul>
<li>**工作区：**就是计算机里的项目文件夹</li>
<li>**暂存区：**一个临时存储区域，用来存储需要提交到本地仓库的文件。通过<code>git add</code>命令将工作区的文件添加到暂存区</li>
<li>**本地仓库：**储存本地分支和远端分支，通过<code>git commit</code>命令可以将暂存区的修改合并到本地仓库</li>
<li>**远程仓库：**部署在远程服务器的仓库。将代码push到远程仓库前，如果此前有别人提交新的commit，需要先进行合并（通过<code>git fetch</code>+<code>git merge</code>或<code>git pull</code>命令）</li>
</ul>
</li>
</ol>
<hr>
<ol start="181">
<li><p>git pull 和 git fetch + git merge 的区别</p>
<ul>
<li><strong>git fetch</strong>：获取远程仓库的最新更新，并更新到本地的远程分支仓库，本地分支不会更新。</li>
<li><strong>git pull</strong>：获取远程分支的更新，更新到本地的远程分支仓库，然后自动将本地分支和远程分支进行合并。</li>
</ul>
<p>所以git pull = git fetch + git merge。</p>
</li>
</ol>
<hr>
<ol start="182">
<li><p>git rebase的作用</p>
<p>把本地由分支合并导致的分叉提交历史整理成直线，目的是让提交历史更简洁，容易查看。</p>
</li>
</ol>
<hr>
<ol start="183">
<li>git常见命令<ul>
<li>git add：将文件添加到暂存区</li>
<li>git commit：将暂存区的修改提交到本地仓库</li>
<li>git fetch：获取远程分支的最新更新，更新到本地的远端仓库</li>
<li>git merge：将本地分支和远程分支合并</li>
<li>git pull = git fetch + git merge</li>
<li>git rebase：变基，作用是将由于分支合并导致的分叉提交历史整理成一条直线，目的是让提交历史更简洁，容易查看。、</li>
<li>git branch：创建分支</li>
<li>git checkout/git switch：切换分支</li>
<li>git checkout -b/git s：创建并切换分支</li>
</ul>
</li>
</ol>
<hr>
<ol start="184">
<li>多人协作时怎么管理分支？<ul>
<li>首先创建两个分支：master分支作为生产分支，dev分支作为开发分支。并且不在这两个分支上进行开发</li>
<li>当开发一个新功能，或者修复一个bug时，从dev切出一个新的feature或者bugFix分支，功能完成后合并到dev分支并删除</li>
<li>发布新版本时，将dev分支合并到master分支。</li>
</ul>
</li>
</ol>

<ol start="183">
<li><p>JS setTimeout() / setInterval() 定时器</p>
<ul>
<li><p>为什么setTimeout() / setInterval()不可靠？</p>
<ul>
<li><p>因为当到了定时器设置的时间后，由于js的单线程机制，回调不会直接执行，而是添加到任务队列中。如果此时任务队列中有任务正在等待，定时器就会产生误差。</p>
</li>
<li><p>其次，如果同步代码执行过久，也会导致定时器不准，考虑如下场景：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">setTimeout</span>(<span class="function">() =&gt;</span> &#123;</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="number">1</span>);</span><br><span class="line">&#125;, <span class="number">20</span>);</span><br><span class="line"><span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="number">0</span>; i &lt; <span class="number">90000000</span>; i++) &#123; &#125; </span><br><span class="line"><span class="built_in">setTimeout</span>(<span class="function">() =&gt;</span> &#123;</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="number">2</span>);</span><br><span class="line">&#125;, <span class="number">0</span>);</span><br></pre></td></tr></table></figure>

<p>setTimeout() 设置的回调是<strong>按顺序</strong>添加到<code>延迟队列 ProcessDelayTask</code>里面的，当执行完一个任务后，ProcessDelayTask会计算出到期的任务，然后<strong>依次执行</strong>它们。</p>
<p>在上面的例子中，由于同步代码执行时间远大于延迟时间，任务执行完后，setTimeout() 添加的两个任务都已经到期，会按照添加顺序依次执行。</p>
</li>
<li><p>此外，setInterval() 并未考虑回调本身的耗时，如果回调执行时间等同于执行间隔，结果会是回调会没有间隔地依次执行。</p>
<p>对于这个问题，可以通过嵌套调用setTimeout() 解决：</p>
<figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">setTimeout</span>(<span class="keyword">function</span> <span class="title function_">fn</span>(<span class="params"></span>)&#123;</span><br><span class="line">  <span class="comment">// todo</span></span><br><span class="line">  <span class="built_in">setTimeout</span>(fn,<span class="number">10</span>)</span><br><span class="line">    <span class="comment">// 执行完处理程序的内容后，在末尾再间隔10毫秒来调用该程序，这样就能保证一定是10毫秒的周期调用,这里时间按自己的需求来写</span></span><br><span class="line">&#125;,<span class="number">10</span>)</span><br></pre></td></tr></table></figure></li>
</ul>
</li>
<li><p>解决方案：</p>
<ul>
<li><p>Web Worker(todo)</p>
</li>
<li><p>window.requestAnimationFrame()</p>
<p>window.requestAnimationFrame() 告诉浏览器，你希望执行一个动画，并且要求浏览器在下次重绘前执行指定的回调函数。</p>
<p>回调函数的理想执行频率是每秒60次（60hz刷新率），即每间隔16.7ms执行一次，但不一定保证为16.7ms。</p>
<p>由于requestAnimationFrame每16.7ms执行一次，因此它不适用于间隔很小的定时器。</p>
</li>
</ul>
</li>
</ul>
</li>
</ol>

<ol start="184">
<li><p>接口请求放在 created 中还是 mounted 中？</p>
<p>答：放在 created 和 mounted 中没有区别，因为生命周期钩子是同步执行的，而接口请求是异步代码，根据事件循环机制，异步代码会在同步代码执行完后统一执行。</p>
<p>所以接口请求放在 created 和 mounted 中没有区别，都会在生命周期钩子执行完后执行。</p>
</li>
</ol>
<hr>
<ol start="185">
<li><p>生命周期钩子，created 和 mounted 的区别</p>
<p>答：created 对应创建阶段，created 被调用时组件实例已将创建，数据（响应式数据、方法等）已经初始化。mounted 对应挂载阶段，mounted 被调用时组件已经被挂载到 DOM 上，可以访问 DOM 元素。</p>
</li>
</ol>
<hr>
<ol start="186">
<li><p>created 中可以访问DOM元素吗？</p>
<p>答：不可以访问，因为此时组件刚创建完成，还没有挂载到DOM上，不可以访问DOM元素。</p>
<p>但是可以在异步接口请求中访问DOM元素，因为生命周期钩子是同步执行的，根据事件循环机制，异步的接口请求会在所有生命周期钩子执行完后执行。</p>
</li>
</ol>

<ol start="188">
<li><p>v-if 和 v-show</p>
<ul>
<li>v-if 是<strong>真实的</strong>按条件渲染，它确保了条件区块内的子元素和监听器都会被销毁和重建；并且 v-if 是<strong>惰性的</strong>，如果初始渲染时条件是false，将不会渲染。</li>
<li>v-show 无论初始条件如何，都会被渲染；条件切换时，只有css属性<code>display</code>会被切换，而不是真实的销毁和重建子元素。</li>
</ul>
<p>相比之下，v-if 有更高的切换开销，而 v-show 有更高的初始渲染开销。</p>
<p>如果需要频繁切换，使用 v-show；如果有懒加载的需求，使用 v-if。</p>
<p>问题：能不能实现懒加载的v-show，这样兼具二者的优点。</p>
</li>

<ol start="198">
<li><p>在伙伴匹配项目中，根据多个标签查询用户的场景，sql查询和内存查询哪个性能更好？</p>
<ol>
<li>查询持有所有标签的用户。<code>like &#39;%java%&#39; and like &#39;前端&#39; </code></li>
<li>查询持有任一标签的用户。<code>like &#39;%java%&#39; or like &#39;前端&#39; </code></li>
</ol>
<p>sql查询不占用内存，但是每有一个like条件就要遍历一遍字符串(?)，在like条件很多的场景性能很差。</p>
<p>内存查询（先把数据读取到内存中）：优点是只需要遍历一遍字符串，但是在数据量很大的场景，会占用过多的内存资源。（通过并发进一步优化）</p>
<p>总结：<strong>要具备场景思维</strong>，没有绝对好的方案，具体场景具体分析：</p>
<ul>
<li>根据参数选择查询方式，例如标签数，如果标签数很多，like条件多，可能更适合内存查询；</li>
<li>在数据库连接充足、内存充足的情况下，可以并发同时查询，谁先返回用谁。</li>
<li>还可以结合SQL查询和内存查询，例如先用SQL查询过滤掉一些条目。</li>
</ul>
</li>
</ol>

<ul>
<li><p><u>图片懒加载的必要性</u></p>
<p>当我们访问一个网页时，过多的图片会导致页面加载速度变慢，费了许多力气把所有图片加载完后用户可能早已离开。另一方面，许多图片可能在页面的底部，未出现在视口中，用户根本就没看到，为了加载这些图片白白浪费了性能。</p>

<li><p><u>实现懒加载</u></p>
<p>第一种方式：JS</p>
<p>将img标签的src属性设置为loading图/缺省图，然后设置img标签的自定义属性data-src为要加载的图片地址。再通过js监听窗口滑动，如果图片出现在可视区，就加载图片，即将img的src属性赋值为data-src的值。</p>

></span><br><span class="line"><span class="tag">&lt;<span class="name">img</span> <span class="attr">data-src</span>=<span class="string">&quot;img/6.jpg&quot;</span> <span class="attr">src</span>=<span class="string">&quot;img/0.png&quot;</span> <span class="attr">alt</span>=<span class="string">&quot;xxx&quot;</span> /&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">img</span> <span class="attr">data-src</span>=<span class="string">&quot;img/7.jpg&quot;</span> <span class="attr">src</span>=<span class="string">&quot;img/0.png&quot;</span> <span class="attr">alt</span>=<span class="string">&quot;xxx&quot;</span> /&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">img</span> <span class="attr">data-src</span>=<span class="string">&quot;img/8.jpg&quot;</span> <span class="attr">src</span>=<span class="string">&quot;img/0.png&quot;</span> <span class="attr">alt</span>=<span class="string">&quot;xxx&quot;</span> /&gt;</span></span><br></pre></td></tr></table></figure>

n class="line">      <span class="keyword">if</span> (i.<span class="property">offsetTop</span> &lt;= <span class="variable language_">window</span>.<span class="property">innerHeight</span> + <span class="variable language_">window</span>.<span class="property">scrollY</span>) &#123;</span><br><span class="line">          <span class="comment">//获取自定义data-src属性的值</span></span><br><span class="line">          <span class="keyword">let</span> trueSrc = i.<span class="title function_">getAttribute</span>(<span class="string">&quot;data-src&quot;</span>);</span><br><span class="line">          <span class="comment">//把值赋值给图片的src属性</span></span><br><span class="line">          i.<span class="title function_">setAttribute</span>(<span class="string">&quot;src&quot;</span>, trueSrc);</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="comment">//没发生滚动事件时也要先执行一次</span></span><br><span class="line">  <span class="title function_">ergodic</span>();</span><br></pre></td></tr></table></figure>

<p>第二种方式（优）：Intersection Observer</p>
<p>Intersection Observer的作用是观察目标元素是否可见（出现在视口中）。当目标元素出现或消失在视口中时，会调用回调函数。当img标签第一次可见时，加载图片，然后取消订阅，即可实现懒加载。</p>

<ol start="211">
<li><p>虚拟列表</p>
<p>概念：当列表数据过大时，页面会渲染过多的dom节点，造成卡顿。虚拟列表的原理是，只渲染可见部分的数据，通过滑动偏移量计算应该渲染的数据以及数据的偏移量，模拟列表的滑动。</p>
<p>要计算的核心数据:</p>
<ul>
<li><code>viewportSize</code>：可见区域大小</li>
<li><code>scrollTop</code>：屏幕滑动距离</li>
<li><code>itemSize</code>：列表项高度，假定列表项高度不变。</li>
<li><code>startIndex</code>：要渲染的第一个条目的数组索引。startIndex = Math.floor(scrollTop/itemSize)</li>
<li><code>endIndex</code>：要渲染的最后一个条目的数组索引。endIndex = Math.ceil(viewportSize/itemSize)+startIndex</li>
<li><code>startOffset</code>：列表条目偏移的距离，这个属性用来模拟滑动。startOffset = scrollTop - (scrollTop%itemSize)</li>
</ul>
<p>不定长列表：</p>
<ul>
<li>首先渲染全部数据，记录并缓存所有列表项的高度</li>
<li><code>startIndex</code>：从0开始累加列表项高度之和offsetHeight，直到offsetHeight&gt;=scrollTop，此时的索引就是开始索引startIndex</li>
<li><code>endIndex</code>：继续累加offsetHeight，直到offsetHeight&gt;=scrollTop+scrollContainer.height</li>
</ul>
</li>
</ol>
<hr>
<ol start="211">
<li><p>列表项高度不固定的虚拟列表</p>
<p>html结构：</p>
<figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">&quot;virtual-list&quot;</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!-- container的作用：撑开列表高度，来显示进度条 --&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">&quot;container&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!-- placeholder的作用：占位，避免因增加和删除元素导致其后方元素发生偏移 --&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">&quot;placeholder&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>列表滚动时的逻辑和数据计算：</p>
<ul>
<li><p><code>viewportSize</code>：可见区域大小。即<code>#virtual-list</code>的大小，高400px。</p>
</li>
<li><p><code>totalHeight</code>：初始化时，可见区域已渲染元素的总高度。</p>
</li>
<li><p>初始化：从第一条数据开始渲染，直到下缓存区渲染完毕。当渲染列表项的总高度&gt;可见区域高度时，即<code>totalHeight</code> &gt; <code>virtual-list.height</code>时，可见区域渲染完毕。然后渲染下缓存区，下缓存区为[endIndex+1..endIndex+3]</p>
</li>
<li><p>通过<code>IntersectionObserver</code>监听列表项出现/离开可见区域，第一个列表项（索引为startIndex）不可见时（列表向下滚动），startIndex+1。同时如果上缓存区已经满了，就移除缓存区的第一个元素，并且要更新<code>#placeholder</code>的高度（加上移除元素的高度），防止发生偏移/抖动。最后一个列表项不可见时（列表向上滚动），endIndex-1，后续同理。</p>
</li>
<li><p>当列表向上滚动，索引为startIndex-1的条目可见时，startIndex-1，上缓存区添加一个dom元素，并通过IntersectionObserver监听。同时更新<code>#placeholder</code>的高度（减去新添加元素的高度），防止发生偏移/抖动。</p>
</li>
<li><p>当列表向下滚动，当索引为endIndex+1的条目可见时，endIndex+1，下缓存区添加一个dom元素，并通过IntersectionObserver监听。</p>
</li>
</ul>
</li>
</ol>

<ol start="213">

<ul>
<li><p>字体相关概念：</p>
<p><img src="D:\typora-images\v2-ac7740ba59c49cfebd4fab33ed9faad2_r.jpg" alt="img"></p>
<p>和小时候用的拼音本是一样的，浏览器中字体的显示也是有四条线的：top、middle、basline、bottom。</p>
</li>
<li><p>baseline 基线：基线的定位来源于字母x，x的下边缘就是基线的位置。</p>
</li>
<li><p>x-height：基线和中线之间的距离，即小写x的高度。1ex就是x-height的值。</p>
</li>
<li><p>font-size：设置的值就是top-line和bottom-line之间的距离。1em=font-size的值。</p>
</li>
<li><p>line-box：每行内容都有一个line-box容器，包含行内的所有内联元素（例如行内块元素）。</p>
</li>
<li><p>content-area：文字内容的区域，当文本只有单行时，content-area的高度 = font-size</p>
</li>
<li><p>line-height：指文本行基线间的垂直距离，决定line-box的高度和行距。对于单行文本，如果line-height和font-size有差异，差值会平均的加在font-size两端。所以如果line-height=元素高度，文字会自然垂直居中。</p>
<p><img src="D:\typora-images\v2-b372ec1f2a987bdfc1f377f198631d3e_1440w.jpg" alt="img"></p>
</li>
<li><p>vertical-align：指定行内元素的垂直对齐方式，默认值为baseline。vertical-align：middle的含义是元素的中点与行盒子基线加上<a target="_blank" rel="noopener" href="https://zhida.zhihu.com/search?content_id=113619832&content_type=Article&match_order=3&q=x-height&zhida_source=entity">x-height</a>的一半对齐。如图所示：</p>
<p><img src="D:\typora-images\v2-d9cacea8e153dea2bd6d03fa41fafcec_r.jpg" alt="img"></p>
</li>
<li><p>inline-block元素的基线在哪？</p>
<p>如果一个inline-block元素，里面没有内联元素，或者有内联元素但是overflow不是visible，则该元素的基线是其margin底边缘；否则其基线就是元素里面最后一行内联元素的基线。</p>
</li>
</ul>

<p>不定高虚拟列表组件，实现思路</p>
<ol>
<li>组件props：数据源data-source、最小高度min-size（宽度）</li>
<li>插槽props：v-for的item、index参数</li>
<li>初始化时，从头渲染数据，直到占满整个屏幕和下缓存区（初始大小3个），通过控制v-for数据源实现。</li>
<li>v-for数据源：actual-data-source，为topCacheStartIdx和bottomCacheEndIdx的计算属性（上缓存区上索引和下缓存区下索引，topCacheStartIdx到bottomCacheEndIdx即列表要渲染的全部数据）</li>
<li>列表向下滚动时，索引为startIndex的条目不可见（通过IntersectionObserver监听），则更新startIndex = startIndex + 1，并更新缓存区索引</li>
<li>列表向下滚动时，如果索引为endIndex+1的条目可见（通过IntersectionObserver监听），则更新endIndex = endIndex+1，并更新缓存区索引</li>
<li>当缓存区存在空缺，并且未到数据源边界，需要补充条目到缓存区。当上缓存区增删条目时时，先设置绝对定位，浏览器渲染完毕，记录好高度后，再更新v-for数据源（即更新上缓存索引），随后更新placeholder的高度，避免抖动。</li>
</ol>

<ol start="216">
<li>clientHeight / offsetHeight / scrollHeight 的区别</li>

<ul>
<li>clientHeight：内容区域 + 上下内边距（不包括边框和水平进度条）</li>
<li>offsetHeight：内容区域 + 上下内边距 + 边框 + 水平进度条</li>
<li>scrollHeight：内容区域（包括溢出部分） + 上下内边距。如果没有内容溢出，则等价于clientHeight</li>
</ul>
